    host: datastore
    domain: infra
    status: actif
    inputs: []
    outputs: []
    notes: >-
      Déclenché après tiles_backup. Backup site assets (datastore→pbs) +
      photolive (front2→pbs) + pbs→NAS. Scripts prod non mappés dans les
      clones.

