      - api://tempsreel/push-server-pub
    notes: >-
      Handler HTTP GET authentifié par PSK (_psk). Reçoit payload JSON de la
      station Ventoux (messages 5/8/15 champs selon type : HH:2, H:10, HH:00).
      Insère dans V5_data_mf.mf_data_{year}_{month} (id_station='VENTOUX') puis
      publie vers tempsreel.infoclimat.net/push-server-pub?id=VENTOUX.

  - id: mobile-api.publication-obs
    repo: site-infoclimat
    script: "mobile-api/inc/publication-obs_api.inc.php"
    trigger:
      type: webhook
      source: "site-infoclimat:mobile-api/inc/publication-obs_api.inc.php"
      schedule: "sur requête HTTP"
    host: inconnu
    domain: appli
    status: actif
    inputs:
      - mariadb://V5/comptes
    outputs:
      - mariadb://V5/temps_calme
      - mariadb://V5/requetes_ma
      - mariadb://V5/meteoalerte
      - mariadb://V5_photolive/photos
      - api://tempsreel/push-server-pub
    notes: >-
      Handler POST mobile API publication d'observation (phénomènes météo +
      photo optionnelle). Payload POST : id_compte, user_hash, latitude,
      longitude, phenomenes_niveau1, niveaux2, valeurs mesurées. Selon le
      phénomène : INSERT INTO V5.temps_calme (temps calme) ou INSERT INTO
      V5.requetes_ma + REPLACE INTO V5.meteoalerte (obs MeteoAlerte) ; si
      photo jointe : INSERT INTO V5_photolive.photos. Publie via
      IC_push_stream_put('meteoalerte_users') → api://tempsreel/push-server-pub.

  - id: mobile-api.observation-like
    repo: site-infoclimat
    script: "mobile-api/inc/observation-like_api.inc.php"
    trigger:
      type: webhook
      source: "site-infoclimat:mobile-api/inc/observation-like_api.inc.php"
      schedule: "sur requête HTTP"
    host: inconnu
    domain: appli
    status: actif
    inputs:
      - mariadb://V5/likes
    outputs:
      - mariadb://V5/likes
      - mariadb://V5/likes_cache
      - api://tempsreel/push-server-pub
    notes: >-
      Handler POST mobile API like d'observation (MA ou TC). Payload POST :
      id (format "ma:N" ou "tc:N"). SELECT COUNT sur V5.likes pour vérifier
      doublon, puis INSERT INTO V5.likes + REPLACE INTO V5.likes_cache.
      Publie via IC_push_stream_put('meteoalerte_users').

  - id: meteoalerte.gateway
    repo: site-infoclimat
    script: "meteoalerte/gateway.php"
    trigger:
      type: webhook
      source: "site-infoclimat:meteoalerte/gateway.php"
      schedule: "sur requête HTTP"
    host: inconnu
    domain: vigilance
    status: actif
    inputs:
      - mariadb://V5/comptes
    outputs:
      - mariadb://V5/temps_calme
      - mariadb://V5/requetes_ma
      - mariadb://V5/meteoalerte
      - mariadb://V5_photolive/photos
      - api://tempsreel/push-server-pub
    notes: >-
      Handler HTTP (GET+POST) publication d'observation MeteoAlerte via interface
      web (formulaire ou ajax). Payload POST : phénomènes, valeurs mesurées,
      photo optionnelle (upload). Selon photo : INSERT INTO V5_photolive.photos ;
      INSERT INTO V5.temps_calme (si temps calme ou T/neige/vent) ; INSERT INTO
      V5.requetes_ma ; POST vers meteoalerte.com/france/obs/process_meteoalerte.php ;
      si succès MA : REPLACE INTO V5.meteoalerte. Publie via IC_push_stream_put.

  - id: admin-photolive.valide
    repo: site-infoclimat
    script: "admin-photolive/valide.php"
    trigger:
      type: webhook
      source: "site-infoclimat:admin-photolive/valide.php"
      schedule: "sur requête HTTP"
    host: inconnu
    domain: autre
    status: actif
    inputs:
      - mariadb://V5_photolive/photos
    outputs:
      - mariadb://V5_photolive/photos
      - file://front2/webroot/photolive/photos/{YYYY-MM}
      - api://tempsreel/push-server-pub
    notes: >-
      Handler HTTP GET moderateur PhotoLive (validation photo). Paramètre GET :
      id (id photo), token (CSRF). Auth : est_moderateur_photolive() + verif token
      session + fichier modo. Lit V5_photolive.photos (SELECT) ; copie fichiers
      de photos_tmp vers photos/{YYYY-MM}/ ; UPDATE V5_photolive.photos (statut=1,
      photo_url, id_moderateur) ; envoie mail moderateur. Publie via
      IC_push_stream_put('meteoalerte_users') → api://tempsreel/push-server-pub.
      Domain : "autre" (photolive = photos communautaires, hors domaines métier).

  - id: meteoalerte.like
    repo: site-infoclimat
    script: "meteoalerte/like.php"
    trigger:
      type: webhook
      source: "site-infoclimat:meteoalerte/like.php"
      schedule: "sur requête HTTP"
    host: inconnu
    domain: vigilance
    status: actif
    inputs:
      - mariadb://V5/likes
    outputs:
      - mariadb://V5/likes
      - mariadb://V5/likes_cache
      - api://tempsreel/push-server-pub
    notes: >-
      Handler HTTP GET like/unlike d'observation MA ou TC (interface web).
      Paramètres GET : obsid, type (MA|TC), idc, dt ; optionnel : unlike.
      Auth session utilisateur. Like : INSERT INTO V5.likes + REPLACE INTO
      V5.likes_cache. Unlike : DELETE FROM V5.likes + UPDATE V5.likes_cache.
      Publie via IC_push_stream_put('meteoalerte_users').
      Inclus car écriture DB sur requête HTTP directe (route autonome).
