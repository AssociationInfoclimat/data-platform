    host: datastore
    domain: infra
    status: actif
    inputs: []
    outputs: []
    notes: >-
      Image Docker privée — seuls les I/O visibles dans le flow (env/mounts)
      sont listés. Le flow invoque bash /backup/backup_tiles.sh sur datastore
      puis sur pbs ; le script prod n'est pas mappé dans les clones, la source
      tiles et la destination backup (PBS/NAS) ne sont donc pas traçables
      depuis le flow.

