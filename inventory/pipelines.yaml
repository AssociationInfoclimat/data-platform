# Registre des pipelines data Infoclimat — inventaire 2026-06 (constat daté, ne pas éditer après clôture)
# Une entrée par job. Conventions de nommage : data-platform/lineage/namespaces.md
#
# Schéma d'une entrée :
#   id:        identifiant de job lineage (cron.<script> | <section>.<action> | <reseau>.uplink | kestra.<flow>)
#   repo:      repo d'où vient le code exécuté
#   script:    chemin du script principal dans ce repo
#   trigger:
#     type:    cron | kestra | webhook | daemon | systemd | manual
#     source:  fichier qui déclare le déclencheur (repo:chemin[:ligne])
#     schedule: expression cron ou description ("sur uplink LoRa", "permanent")
#   host:      hôte d'exécution (inventaire IaC interne, ou "inconnu")
#   domain:    observations | climato | modeles | cartes | satellite | foudre | radar |
#              vigilance | forums | asso | appli | opendata | infra | autre
#   status:    actif | douteux | mort
#   NB : pour un pipeline `mort` (flow disabled / script absent), inputs/outputs décrivent
#   ce que le CODE déclare — utile pour comprendre quelles tables ne sont plus alimentées.
#   `douteux` couvre aussi : ligne cron active dont le script prod n'est pas mappé dans les clones.
#   inputs:    [datasets lus]   — noms physiques réels, conventions namespaces.md
#   outputs:   [datasets écrits]
#   notes:     doutes, particularités
version: 1
pipelines:
  # ─── system (infra) ────────────────────────────────────────
  - id: kestra.system.failure-alert-discord
    repo: infrapilot
    script: "roles/applications/scheduler/files/flows/system-failure-alert-discord.yml"
    trigger:
      type: kestra
      source: "infrapilot:roles/applications/scheduler/files/flows/system-failure-alert-discord.yml"
      schedule: "sur échec d'un flow (trigger Flow)"
    host: ct-scheduler-1
    domain: infra
    status: actif
    inputs: []
    outputs: []
    notes: "Notification Discord sur FAILED/WARNING. Pas de données métier."

  - id: kestra.system.start-alert-discord
    repo: infrapilot
    script: "roles/applications/scheduler/files/flows/system-start-alert-discord.yml"
    trigger:
      type: kestra
      source: "infrapilot:roles/applications/scheduler/files/flows/system-start-alert-discord.yml"
      schedule: "sur démarrage d'un flow (trigger Flow)"
    host: ct-scheduler-1
    domain: infra
    status: actif
    inputs: []
    outputs: []
    notes: "Notification Discord sur CREATED."

  - id: kestra.system.success-alert-discord
    repo: infrapilot
    script: "roles/applications/scheduler/files/flows/system-success-alert-discord.yml"
    trigger:
      type: kestra
      source: "infrapilot:roles/applications/scheduler/files/flows/system-success-alert-discord.yml"
      schedule: "sur succès d'un flow (trigger Flow)"
    host: ct-scheduler-1
    domain: infra
    status: actif
    inputs: []
    outputs: []
    notes: "Notification Discord sur SUCCESS."

  - id: kestra.system.purge
    repo: infrapilot
    script: "roles/applications/scheduler/files/flows/system-purge.yml"
    trigger:
      type: kestra
      source: "infrapilot:roles/applications/scheduler/files/flows/system-purge.yml"
      schedule: "47 22 * * *"
    host: ct-scheduler-1
    domain: infra
    status: actif
    inputs: []
    outputs: []
    notes: "Purge des exécutions Kestra SUCCESS vieilles d'1 mois."

  # ─── backups ──────────────────────────────────────────
