# Datasets fichiers (datastore, NFS, S3) — inventaire 2026-06
# Schéma d'une entrée :
#   name:       file://datastore/<pattern> | file://modeles/<pattern> | s3://<bucket>/<pattern>
#               ({YYYY}, {MM}, {DD}, {HH} pour les segments datés)
#   format:     geotiff | png | jpg | netcdf | grib2 | json | csv | flv/mp4 | mixte | autre
#   producer:   id de pipeline (pipelines.yaml) ou "externe" ou "inconnu"
#   consumers:  ["<repo>:<fichier>" ou id pipeline, ...]
#   retention:  description si trouvée (script de purge, logrotate) sinon "inconnue"
#   status:     actif | douteux | mort
#   notes:
version: 1
datasets:

  # ── TUILES SATELLITE UKMET (Meteosat SEVIRI via UK Met Office WMS) ──────────
  - name: file://datastore/tempsreel.infoclimat.net/tiles/{YYYY}/{MM}/{DD}/vishdb_{HH}_v{ii}.tif
    format: geotiff
    producer: cron.recup-ukmet
    consumers:
      - mapserver:clouds.map
      - mapserver:cloudsauto.map
      - mapserver:clouds3857.map
    retention: >-
      Purge journalière cron.clean-shm-tif (fichiers /dev/shm *.tif) ; tuiles
      datastore sans script de purge daté trouvé — rétention inconnue.
    status: actif
    notes: >-
      Visible (VIS HD) depuis UKMET WMS. Même pipeline produit vishdb,
      vishdbtrans, irAhdb, irAhdbtrans (4 couches Meteosat).

  - name: >-
      file://datastore/tempsreel.infoclimat.net/tiles/{YYYY}/{MM}/{DD}/vishdbtrans_{HH}_v{ii}.tif
    format: geotiff
    producer: cron.recup-ukmet
    consumers:
      - mapserver:clouds.map
    retention: inconnue
    status: actif
    notes: Variante VIS HD transparente (alpha) du dataset vishdb.

  - name: file://datastore/tempsreel.infoclimat.net/tiles/{YYYY}/{MM}/{DD}/irAhdb_{HH}_v{ii}.tif
    format: geotiff
    producer: cron.recup-ukmet
    consumers:
      - mapserver:clouds.map
      - mapserver:cloudsauto.map
    retention: inconnue
    status: actif
    notes: Infrarouge (IR A) depuis UKMET WMS, couche Meteosat SEVIRI.

  - name: >-
      file://datastore/tempsreel.infoclimat.net/tiles/{YYYY}/{MM}/{DD}/irAhdbtrans_{HH}_v{ii}.tif
    format: geotiff
    producer: cron.recup-ukmet
    consumers:
      - mapserver:clouds.map
    retention: inconnue
    status: actif
    notes: Variante IR transparente du dataset irAhdb.

  # ── TUILES SATELLITE GOES WEST (legacy NOAA GOES-West) ──────────────────────
  - name: file://datastore/tempsreel.infoclimat.net/tiles/{AAAA}/{MM}/{DD}/goeswi4_{HH}_v{ii}.tif
    format: geotiff
    producer: cron.goes-ir4
    consumers:
      - mapserver:clouds.map
    retention: inconnue
    status: actif
    notes: Infrarouge canal 4 GOES-West (satepsanone.noaa.gov).

  - name: >-
      file://datastore/tempsreel.infoclimat.net/tiles/{AAAA}/{MM}/{DD}/goeswvis_{HH}_v{ii}.tif
    format: geotiff
    producer: cron.goes-vis
    consumers:
      - mapserver:clouds.map
    retention: inconnue
    status: actif
    notes: Visible GOES-West (satepsanone.noaa.gov).

  # ── TUILES SATELLITE GOES EAST-16 (NOAA GOES-16 ABI) ────────────────────────
  - name: file://datastore/tempsreel.infoclimat.net/tiles/{AAAA}/{MM}/{DD}/goesei7_{HH}_v{ii}.tif
    format: geotiff
    producer: cron.goes-ir-new
    consumers:
      - mapserver:clouds.map
    retention: inconnue
    status: actif
    notes: Canal 7 IR (3.9 µm) GOES-East 16 depuis cdn.star.nesdis.noaa.gov.

  - name: >-
      file://datastore/tempsreel.infoclimat.net/tiles/{AAAA}/{MM}/{DD}/goesvisnew_{HH}_v{ii}.tif
    format: geotiff
    producer: cron.goes-vis-new
    consumers:
      - mapserver:clouds.map
    retention: inconnue
    status: actif
    notes: Visible GOES-East 16 depuis cdn.star.nesdis.noaa.gov.

  # ── TUILES SATELLITE HIMAWARI-8 ──────────────────────────────────────────────
  - name: >-
      file://datastore/tempsreel.infoclimat.net/tiles/{AAAA}/{MM}/{DD}/himawarirgb_{HH}_v{ii}.tif
    format: geotiff
    producer: cron.himawari
    consumers:
      - mapserver:clouds.map
    retention: inconnue
    status: actif
    notes: Composite RGB Himawari-8 depuis NICT (Japan Aerospace Exploration Agency).

  # ── TUILES RADAR MÉTÉO-FRANCE ────────────────────────────────────────────────
  - name: file://datastore/tempsreel.infoclimat.net/tiles/{AAAA}/{MM}/{DD}/MF_raw_{DDHHii}.png
    format: png
    producer: cron.radarmf
    consumers:
      - site-infoclimat:cron/radarmf.php
    retention: inconnue
    status: actif
    notes: >-
      PNG brut radar MF depuis donneespubliques.meteofrance.fr, intermédiaire
      avant conversion GeoTIFF.

  - name: file://datastore/tempsreel.infoclimat.net/tiles/{AAAA}/{MM}/{DD}/radarmf_{HH}_v{ii}.tif
    format: geotiff
    producer: cron.radarmf
    consumers:
      - mapserver:radar_fused.map
      - python-climate-services.pluviometrie
      - python-climate-services.combined
    retention: inconnue
    status: actif
    notes: GeoTIFF radar MF (lame d'eau), servi par mapserver et python-climate-services.

  # ── TUILES RADAR COMEPHORE / AC60 (montage fs1 pour mapserver legacy) ────────
  - name: >-
      file://datastore/tempsreel.infoclimat.net/tiles/{AAAA}/{MM}/{DD}/comephoreRGB_{HH}_v00.tif
    format: geotiff
    producer: inconnu
    consumers:
      - mapserver:radar_fused.map
    retention: inconnue
    status: douteux
    notes: >-
      Référencé dans mapserver/radar_fused.map via le montage legacy fs1 (tempsreel.infoclimat.net/tiles/).
      Producteur non identifié dans les clones (pipeline kestra.infoclimat.data.meteorology.download-and-convert-radar
      image Docker privée, sous-chemin absent du flow).

  - name: >-
      file://datastore/tempsreel.infoclimat.net/tiles/{AAAA}/{MM}/{DD}/colorac60radaric_{HH}_v00.tif
    format: geotiff
    producer: inconnu
    consumers:
      - mapserver:radar_fused.map
    retention: inconnue
    status: douteux
    notes: >-
      Même situation que comephoreRGB ; radar colorisé IC/AC60 (Météo-France + Infoclimat),
      vu via le montage legacy fs1 de srx-mapserver-2, producteur non traçable depuis les clones.

  # ── TUILES NEXRAD (NOAA USA) ─────────────────────────────────────────────────
  - name: file://datastore/tempsreel.infoclimat.net/tiles/{AAAA}/{MM}/{DD}/nexrad_{HH}_v{ii}.tif
    format: geotiff
    producer: cron.nexrad
    consumers:
      - mapserver:clouds.map
    retention: inconnue
    status: actif
    notes: NEXRAD composite N0Q depuis mesonet.agron.iastate.edu.

  # ── TUILES FOUDRE ────────────────────────────────────────────────────────────
  - name: file://datastore/tempsreel.infoclimat.net/tiles/{AAAA}/{MM}/{DD}/foudre_{HH}_v{ii}.shp
    format: autre
    producer: cron.foudre
    consumers:
      - mapserver:foudre.map
      - mapserver:foudre2.map
      - mapserver:foudre_densite.map
      - mapserver:foudre_opacity.map
    retention: inconnue
    status: actif
    notes: >-
      Shapefile (.shp + .dbf + .shx) des impacts foudre Blitzortung/IC-Meteonet.
      Servi par plusieurs mapfiles foudre. Également last.sqlite.json en JSON plat.

  - name: file://datastore/tempsreel.infoclimat.net/tiles/last.sqlite.json
    format: json
    producer: cron.foudre
    consumers:
      - site-infoclimat:cartes/jsontiles.php
    retention: inconnue
    status: actif
    notes: >-
      Fichier JSON des derniers impacts foudre (accès rapide temps réel),
      écrasé à chaque run (pas de segment daté).

  # ── TUILES ESTOFEX ──────────────────────────────────────────────────────────
  - name: file://datastore/tempsreel.infoclimat.net/tiles/estofex_{ts}.geojson
    format: json
    producer: cron.estofex
    consumers:
      - site-infoclimat:cartes/jsontiles.php
    retention: inconnue
    status: actif
    notes: GeoJSON des prévisions convectives ESTOFEX (estofex.org), non daté en répertoire.

  # ── TUILES ENSOLEILLEMENT (MSGCPP Meteosat) ──────────────────────────────────
  - name: file://datastore/tempsreel.infoclimat.net/tiles/{AAAA}/{MM}/{DD}/ensol_{HH}_v{ii}.tif
    format: geotiff
    producer: cron.msgcpp-ensoleillement
    consumers:
      - mapserver:clouds.map
      - python-climate-services.combined
    retention: inconnue
    status: actif
    notes: >-
      Ensoleillement (W/m²) calculé depuis PNG MSGCPP KNMI
      (file://datastore/server5/archives.infoclimat.net/satellIC/srad/).

  # ── TUILES CLIMATOLOGIE MENSUELLE ───────────────────────────────────────────
  - name: >-
      file://datastore/tempsreel.infoclimat.net/tiles/{AAAA}/{MM}/99/climm_{param}_99_v0.tif
    format: geotiff
    producer: cron.climato.mensuelle
    consumers:
      - mapserver:MDLraster.map
      - python-climate-services.combined
    retention: inconnue
    status: actif
    notes: >-
      Grilles GeoTIFF des anomalies/valeurs climatologiques mensuelles (TN, TX, RR…).
      99 = jour fictif pour mensuel ; produit aussi par cron.climato.mensuelle-current.

  # ── TUILES NORMALES CLIMATOLOGIQUES (SQLite) ─────────────────────────────────
  - name: file://datastore/tempsreel.infoclimat.net/tiles/8110/{MM}/99_99.sqlite
    format: autre
    producer: cron.climato-normales.mois-01
    consumers:
      - python-climate-services.pluviometrie
      - python-climate-services.combined
      - site-infoclimat:include/communs/jsontiles.php
    retention: inconnue
    status: actif
    notes: >-
      SQLite des normales mensuelles par station (id=8110, un fichier par mois).
      12 pipelines producteurs (cron.climato-normales.mois-01 à mois-12).

  # ── TUILES CARTES MÉTÉO 24 H (grilles GeoTIFF multiparamètres) ──────────────
  - name: file://datastore/tempsreel.infoclimat.net/tiles/{AAAA}/{MM}/{DD}/{map}_00.tif
    format: geotiff
    producer: cron.generation-cartes-24h
    consumers:
      - mapserver:temperature.map
      - mapserver:temperature_HD.map
      - mapserver:temperature_THD.map
      - python-climate-services.combined
    retention: inconnue
    status: actif
    notes: >-
      Grilles GeoTIFF paramétriques (TN, TX, RR, vent, HR…) générées via GMT/GDAL
      depuis synop BD. Également produit par cron.generer-hier (veille).

  # ── ARCHIVES SATELLITE KNMI MSGCPP ──────────────────────────────────────────
  - name: >-
      file://datastore/server5/archives.infoclimat.net/satellIC/{param}/{YYYY}/{MM}/{DD}/{HH}{ii}.png
    format: png
    producer: cron.knmi
    consumers:
      - cron.msgcpp-ensoleillement
      - nginx-config:archives.infoclimat.net.conf
    retention: inconnue
    status: actif
    notes: >-
      6 paramètres MSGCPP (ctop, ch, srad, rrate, gr, cep) en PNG depuis
      KNMI ADAGUC WMS. Également last.png écrasé à chaque run.

  - name: >-
      file://datastore/server5/archives.infoclimat.net/satellIC/{param}/last.png
    format: png
    producer: cron.knmi
    consumers:
      - nginx-config:archives.infoclimat.net.conf
    retention: "écrasé à chaque run (un seul fichier par param)"
    status: actif
    notes: >-
      Dernière image MSGCPP par paramètre, écrasée à chaque run de cron.knmi.
      Pendant daté du dataset archivé {YYYY}/{MM}/{DD}/{HH}{ii}.png.

  - name: >-
      file://datastore/server5/archives.infoclimat.net/satellIC/{key}/last.jpg
    format: jpg
    producer: cron.eumetsat
    consumers:
      - nginx-config:archives.infoclimat.net.conf
    retention: inconnue
    status: actif
    notes: >-
      Images EUMETSAT Eumetview (RGB naturel, airmass, vapeur eau, brouillard,
      convection, AMV). Seul last.jpg par clé (non archivé en date).

  # ── SATELLITE MODIS TERRA ────────────────────────────────────────────────────
  - name: file://datastore/satellite/modis
    format: mixte
    producer: kestra.infoclimat.front.cron.sat-modis
    consumers:
      - site-infoclimat:cron/sat_modis.php
      - site-legacy:var/www/infoclimat.fr/v5/web/cartes/satellites/{YYYY}/{date}.jpg
    retention: inconnue
    status: actif
    notes: >-
      Images MODIS Terra (NASA Worldview/LANCE) et DLR Taurus, PNG/JPEG.
      Doublon avec kestra.infoclimat.front.cron.sat-modis-new (à arbitrer).

  # ── DONNÉES CARTOGRAPHIQUES KNMI (ifremer dir) ───────────────────────────────
  - name: file://datastore/data/cartes/ifremer
    format: geotiff
    producer: kestra.infoclimat.data.sat-knmi
    consumers:
      - mapserver:clouds.map
      - mapserver:cloudsauto.map
    retention: inconnue
    status: actif
    notes: >-
      GeoTIFF MSG-CPP depuis KNMI ADAGUC API, stockés dans data/cartes/ifremer.
      Servi par mapserver docker via mount datastore:ro.

  # ── DONNÉES SYNOP BRUTES (raw download) ─────────────────────────────────────
  - name: file://datastore/data/synop
    format: autre
    producer: inconnu
    consumers:
      - kestra.infoclimat.data.cleanup
      - cron.cleanup.front2
      - cron.cleanup.nginx2
    retention: >-
      Purge mtime +30 jours via data/cleanup.sh (kestra.infoclimat.data.cleanup
      quotidien 00:02 UTC) ; couvre synop/ogimet, synop/meteocentre, synop/aemet-csv,
      assets/synop/bufr.
    status: actif
    notes: >-
      Fichiers SYNOP bruts (téléchargements Ogimet, Meteocentre, AEMET, BUFR NOAA).
      Producteur dans pipelines : kestra.infoclimat.data.recuperation.bufr et autres
      non listés comme output file (DB cible).

  # ── DONNÉES METAR BRUTES ─────────────────────────────────────────────────────
  - name: file://datastore/data/metar
    format: autre
    producer: inconnu
    consumers:
      - kestra.infoclimat.data.cleanup
    retention: Purge mtime +30 jours via data/cleanup.sh (quotidien 00:02 UTC).
    status: actif
    notes: >-
      Fichiers METAR bruts (NOAA, Meteocentre). Producteur : scripts de récupération
      METAR non tracés comme output fichier dans pipelines.yaml.

  # ── DONNÉES MF BRUTES ────────────────────────────────────────────────────────
  - name: file://datastore/data/mf
    format: autre
    producer: inconnu
    consumers:
      - kestra.infoclimat.data.cleanup
    retention: Purge mtime +30 jours via data/cleanup.sh (quotidien 00:02 UTC).
    status: actif
    notes: >-
      Fichiers Météo-France bruts (données portail MF). Producteur non tracé
      comme output fichier dans pipelines.yaml.

  # ── DONNÉES STATIC BRUTES (WeatherLink, WLK) ─────────────────────────────────
  - name: file://datastore/data/static
    format: autre
    producer: inconnu
    consumers:
      - kestra.infoclimat.data.cleanup
    retention: >-
      Purge mtime +30 jours via data/cleanup.sh ; couvre static/mnw,
      static/weatherlink, static/wlkIPxml, static/wlkLive.
    status: actif
    notes: >-
      Fichiers statiques stations (WeatherLink, WLK Live, MNW). Producteur non
      tracé comme output fichier dans pipelines.yaml.

  # ── BUFR STORAGE (intermédiaire décodage SYNOP) ──────────────────────────────
  - name: file://datastore/bufr_storage/{YYYY}/{MM}/{DD}/{HH}
    format: autre
    producer: inconnu
    consumers:
      - site-infoclimat:data/recuperation/synop/bufr/bufr.inc.php
      - site-infoclimat:data/recalculs/trouver_bufr_id_station.php
    retention: inconnue
    status: actif
    notes: >-
      Fichiers BUFR bruts (NOAA via FTP) + expbufr_{0,1}.bufr décodés,
      organisés par date/heure/station. Producteur : pipeline bufr non tracé
      comme output fichier (output est mariadb://V5_data).

  # ── COPERNICUS BIOCLIMATIQUE FUTUR ──────────────────────────────────────────
  - name: file://datastore/copernicus-downscaled-bioclimatic-future
    format: geotiff
    producer: externe
    consumers:
      - python-climate-services.combined
    retention: inconnue
    status: actif
    notes: >-
      Données bioclimatiques Copernicus downscalées (GeoTIFF). Producteur externe
      (téléchargement manuel/script non cloné). Consommé par python-climate-services
      combined via datastore:/copernicus-downscaled-bioclimatic-future.

  # ── STATICTILES HYDROLOGIE (MVT vecteur) ────────────────────────────────────
  - name: file://datastore/tempsreel.infoclimat.net/statictiles/troncons-vigicrues
    format: autre
    producer: inconnu
    consumers:
      - site-infoclimat:climato/indicateur_national_RR.php
    retention: inconnue
    status: actif
    notes: >-
      Tuiles vecteur MVT (.pbf) des tronçons Vigicrues (Eaufrance). Producteur :
      site-infoclimat:cron/hydro/eaufrance_rivieres.php — script absent des outputs
      pipelines.yaml (seul output DB est listé).

  - name: file://datastore/tempsreel.infoclimat.net/statictiles/posteshydro
    format: autre
    producer: inconnu
    consumers:
      - site-infoclimat:climato/indicateur_national_RR.php
    retention: inconnue
    status: actif
    notes: >-
      Tuiles vecteur MVT des postes hydrologiques Eaufrance. Producteur :
      site-infoclimat:cron/hydro/stations_convert_to_MVT.php — non tracé dans pipelines.yaml.

  # ── VIGNETTES STATIONS ───────────────────────────────────────────────────────
  - name: file://datastore/vignettes
    format: png
    producer: kestra.infoclimat.front.cron.update-vignettes
    consumers:
      - site-infoclimat:include/vignettes/stations-meteo/{id}.html
      - nginx-config:static.conf
    retention: inconnue
    status: actif
    notes: >-
      PNG des vignettes météo par station (observations actuelles). Même dataset
      produit par cron.vignettes.front2 et cron.vignettes.nginx2 (migration).

  # ── WEBCAM DDU (Dumont d'Urville) ───────────────────────────────────────────
  - name: file://datastore/webcam/ddu
    format: jpg
    producer: kestra.infoclimat.front.cron.webcam-ddu
    consumers:
      - site-infoclimat:cron/ddu/recup_webcam.php
    retention: inconnue
    status: actif
    notes: >-
      Images webcam DDU (Dumont d'Urville) récupérées via IMAP Gmail. Produit aussi
      par cron.webcam-ddu.front2 / cron.webcam-ddu.nginx2 (migration).

  # ── WEBCAM FOSCAM FTPS (static upload stations) ──────────────────────────────
  - name: file://site-infoclimat/FTPS/ftp_static/{user}/FoscamCamera_{id}/snap/*.jpg
    format: jpg
    producer: externe
    consumers:
      - cron.webcams-renommer-last
    retention: inconnue
    status: actif
    notes: >-
      JPG uploadés par FTP depuis caméras Foscam (stations membres). Producteur
      externe (camera). Consommé par cron.webcams-renommer-last qui génère webcam_{nom}.jpg.

  - name: file://site-infoclimat/FTPS/ftp_static/{user}/webcam_{nom}.jpg
    format: jpg
    producer: cron.webcams-renommer-last
    consumers:
      - site-infoclimat:cartes/getProxyWebcam.php
    retention: inconnue
    status: actif
    notes: Dernière image de chaque webcam FTPS renommée par cron.webcams-renommer-last.

  # ── ARCHIVES WEBCAMS MEMBRES ─────────────────────────────────────────────────
  - name: file://site-legacy/webroot/multimedia/webcams/{YYYY/MM/DD/HH/}
    format: jpg
    producer: cron.archivage_webcams
    consumers:
      - site-infoclimat:cartes/stations-meteo_getWebcam.php
    retention: inconnue
    status: actif
    notes: >-
      Archives horaires des webcams membres (JPG). Produit aussi par
      cron.archivage-webcams sur srx-data-2 (chemin site-infoclimat).

  - name: file://site-infoclimat/cartes/webcams/{id}/{DD-MM-YYYY_ZHHii}.jpg
    format: jpg
    producer: cron.archivage-webcams
    consumers:
      - site-infoclimat:include/ajax/getDataCam.php
    retention: inconnue
    status: actif
    notes: >-
      Archives webcams par ID de station (format date {DD-MM-YYYY_ZHHii}),
      produit par cron.archivage-webcams sur srx-data-2.

  # ── PHOTOLIVE PHOTOS ─────────────────────────────────────────────────────────
  - name: file://front2/webroot/photolive/photos/{YYYY-MM}
    format: jpg
    producer: admin-photolive.valide
    consumers:
      - site-infoclimat:photolive/autoresize.php
      - site-infoclimat:photolive/admin/maj_vignettes.php
      - site-infoclimat:mobile-api/inc/photolive_api.inc.php
    retention: inconnue
    status: actif
    notes: >-
      Photos validées sur PhotoLive (images météo membres), organisées par
      YYYY-MM. Également thumbs/ et vignettes/ (non listés séparément :
      même producteur, même répertoire).

  # ── MARITIME NETCDF (Ifremer/Copernicus océan) ───────────────────────────────
  - name: file://mapserver/maritime/last_download.tmp.nc
    format: netcdf
    producer: cron.ifremer-dl
    consumers:
      - mapserver:clouds.map
    retention: inconnue
    status: actif
    notes: >-
      NetCDF température de surface mer (Ifremer/CMEMS Méditerranée globale),
      fichier temporaire écrasé à chaque run. Monté dans docker mapserver.

  - name: file://mapserver/maritime/last_download_BRA.tmp.nc
    format: netcdf
    producer: cron.med-bra-dl
    consumers:
      - mapserver:clouds.map
    retention: inconnue
    status: actif
    notes: NetCDF SST Brésil depuis CMEMS, fichier temporaire.

  - name: file://mapserver/maritime/last_download_GBR.tmp.nc
    format: netcdf
    producer: cron.med-gbr-dl
    consumers:
      - mapserver:clouds.map
    retention: inconnue
    status: actif
    notes: NetCDF SST Grande-Bretagne depuis CMEMS, fichier temporaire.

