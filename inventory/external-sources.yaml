# Sources de données externes consommées — inventaire 2026-06
# Schéma d'une entrée :
#   name:      api://<source>/<dataset>  (ex. api://meteofrance/paquets-observations)
#   url_hint:  URL ou host repéré dans le code
#   auth:      none | token | compte (ne JAMAIS copier de secret ici)
#   consumers: [ids de pipelines]
#   notes:
version: 1
sources:

  # ─── Météo-France ──────────────────────────────────────────────────────────

  - name: api://meteofrance/DPVigilance
    url_hint: https://public-api.meteofrance.fr/public/DPVigilance/v1/
    auth: token
    consumers:
      - kestra.infoclimat.data.meteofrance.vigilance
      - cron.vigilance-meteofrance.front2
    notes: >-
      Token OAuth2 récupéré via POST https://portail-api.meteofrance.fr/token
      (APPLICATION_ID en env). Tracé dans include/Vigilances/vigilances.php.

  - name: api://meteofrance/donnees-libres-radar
    url_hint: https://public-api.meteofrance.fr/public/DPRadar/v1/mosaiques
    auth: token
    consumers:
      - cron.radarmf
      - cron.compo-new
      - kestra.infoclimat.data.meteorology.download-and-convert-radar
    notes: >-
      Même token OAuth2 portail-api. Tracé dans include/Radar/radar.php.
      Alias pipelines.yaml : api://meteofrance/radar (kestra download-and-convert-radar)
      — même endpoint, deux noms coexistent dans pipelines.yaml.

  - name: api://meteofrance/paquets-observations
    url_hint: https://portail-api.meteofrance.fr/
    auth: token
    consumers:
      - kestra.infoclimat.data.recuperation.launch-data-recup
    notes: >-
      Script shell prod non mappé dans les clones ; url_hint déduit du
      mécanisme OAuth2 portail-api (APPLICATION_ID env). Ancienne source :
      pro.meteofrance.com (compte — script recup_data_mf_extranet, wget cookie,
      mort/legacy). Douteux : pipeline prod non intégralement tracé.

  - name: api://meteofrance/climatologie-portail-api
    url_hint: https://portail-api.meteofrance.fr/
    auth: token
    consumers:
      - kestra.infoclimat.data.meteofrance.climatologie-portail-api.infrahoraires
      - kestra.infoclimat.data.meteofrance.climatologie-portail-api.horaires
    notes: >-
      Scripts prod non mappés dans les clones ; les deux pipelines sont status
      douteux (I/O non traçables depuis le flow). Token OAuth2 portail-api.

  - name: api://meteofrance/donnees-climatologiques
    url_hint: https://portail-api.meteofrance.fr/
    auth: token
    consumers:
      - cron.climato.mensuelle
      - cron.climato.mensuelle-current
      - cron.climato-normales.mois-01
      - cron.climato-normales.mois-02
      - cron.climato-normales.mois-03
      - cron.climato-normales.mois-04
      - cron.climato-normales.mois-05
      - cron.climato-normales.mois-06
      - cron.climato-normales.mois-07
      - cron.climato-normales.mois-08
      - cron.climato-normales.mois-09
      - cron.climato-normales.mois-10
      - cron.climato-normales.mois-11
      - cron.climato-normales.mois-12
    notes: >-
      Ancien endpoint : donneespubliques.meteofrance.fr (références dans le code
      comme liens documentaires). Token OAuth2 portail-api.

  - name: api://meteofrance/donnees-libres-nivo
    url_hint: https://portail-api.meteofrance.fr/
    auth: token
    consumers:
      - cron.recup-donneespub-mf-enneigement
    notes: Données nivologiques libres. Token OAuth2 portail-api.

  - name: api://meteofrance/donnees-libres-marine
    url_hint: https://donneespubliques.meteofrance.fr/donnees_libres/Txt/Marine/
    auth: none
    consumers:
      - cron.mf-bouees
    notes: >-
      CSV Marine téléchargé directement (fopen). Tracé dans
      data/recuperation/mf-bouees.php.

  - name: api://meteofrance/meteo-data-gouv-daily
    url_hint: https://object.data.gouv.fr/meteofrance-pnt/
    auth: none
    consumers:
      - kestra.infoclimat.data.meteofrance.climatologie-meteo-data-gouv.daily
    notes: >-
      Open data data.gouv.fr. Même bucket que l'AROME PNT (object.data.gouv.fr
      / meteofrance-pnt).

  - name: api://meteofrance/meteo-data-gouv-hourly
    url_hint: https://object.data.gouv.fr/meteofrance-pnt/
    auth: none
    consumers:
      - kestra.infoclimat.data.meteofrance.climatologie-meteo-data-gouv.hourly
    notes: Open data data.gouv.fr.

  - name: api://meteofrance/meteo-data-gouv-monthly
    url_hint: https://object.data.gouv.fr/meteofrance-pnt/
    auth: none
    consumers:
      - kestra.infoclimat.data.meteofrance.climatologie-meteo-data-gouv.monthly
    notes: Open data data.gouv.fr.

  - name: api://meteofrance/portail-mf-station
    url_hint: https://portail-api.meteofrance.fr/
    auth: token
    consumers:
      - cron.image-mf
    notes: >-
      Images de bulletins par station MF. Token OAuth2 portail-api. Tracé dans
      cron/image_mf.php (appel interne via mf.controller.php qui délègue au
      portail-api).

  - name: api://meteofrance/dcpc-nwp
    url_hint: http://dcpc-nwp.meteo.fr/services/PS_GetCache_DCPCPreviNum
    auth: token
    consumers:
      - cron.recup-arpege.modeles2
      - cron.recup-arome13.modeles2
      - cron.recup-arome-antilles.modeles2
    notes: >-
      Token passé en paramètre ?token=… (env TOKEN_MF). Tracé dans
      modeles-php/GFS/script/recup_arpege05.async.php,
      recup_arome13.async.php, recup_arome_antilles.php.

  - name: api://data.gouv.fr/meteofrance-pnt-arome
    url_hint: https://object.data.gouv.fr/meteofrance-pnt/pnt/
    auth: none
    consumers:
      - cron.recup-arome.modeles2
    notes: >-
      AROME 0.025° open data via bucket S3 data.gouv.fr. Tracé dans
      modeles-php/GFS/script/recup_arome.async.php.

  # ─── NOAA / NWS ────────────────────────────────────────────────────────────

  - name: api://noaa/nomads-gfs
    url_hint: https://nomads.ncep.noaa.gov/
    auth: none
    consumers:
      - kestra.infoclimat.forecast.gfs.fetch-gfs-modeles-2
      - cron.recup-gfs05.modeles2
      - cron.recup-gfs1deg.modeles2
      - cron.recup-gfshd.modeles2
    notes: >-
      Téléchargement GRIB2 via filter_gfs_hd.pl / pub/data. Tracé dans
      modeles-php/GFS/script/recup_data_2.php.

  - name: api://noaa/nomads-gefs
    url_hint: https://nomads.ncep.noaa.gov/pub/data/nccf/com/gens/prod/gefs.
    auth: none
    consumers:
      - kestra.infoclimat.forecast.gefs.fetch-gefs-modeles-2
      - cron.recup-gefs-ctrl.modeles2
      - cron.recup-gefs-avg.modeles2
      - cron.recup-gefs-gep.modeles2
      - cron.recup-gefs-spr.modeles2
    notes: >-
      Tracé dans modeles-php/GFS/script/recup_gefs_new.php.

  - name: api://noaa/synop
    url_hint: https://tgftp.nws.noaa.gov/SL.us008001/
    auth: none
    consumers:
      - kestra.infoclimat.data.recuperation.launch-data-recup
    notes: >-
      Données SYNOP NOAA/NWS. Tracé dans
      site-infoclimat/data/recuperation/synop/.

  - name: api://noaa/metar
    url_hint: https://tgftp.nws.noaa.gov/SL.us008001/DF.an/DC.sfmar/
    auth: none
    consumers:
      - kestra.infoclimat.data.recuperation.launch-data-recup
    notes: >-
      METAR buoys / ships. Tracé dans
      site-infoclimat/data/recuperation/bouees/noaa.php.

  - name: api://noaa/bufr
    url_hint: https://tgftp.nws.noaa.gov/SL.us008001/DF.bf/DC.intl/
    auth: none
    consumers:
      - kestra.infoclimat.data.recuperation.bufr
      - cron.recuperation-bufr.mysql3
    notes: >-
      BUFR international. Tracé dans
      site-infoclimat/data/recuperation/synop/bufr/bufr.inc.php.

  - name: api://noaa/cdn-star-goes16-abi-conus-07
    url_hint: https://cdn.star.nesdis.noaa.gov/GOES16/ABI/CONUS/07/
    auth: none
    consumers:
      - cron.goes-ir-new
    notes: >-
      Canal IR 07 GOES-16. Tracé dans
      site-infoclimat/data/cartes/goes/getDataIRNew.php.

  - name: api://noaa/cdn-star-goes16-abi-conus-vis
    url_hint: https://cdn.star.nesdis.noaa.gov/GOES16/ABI/CONUS/GEOCOLOR/
    auth: none
    consumers:
      - cron.goes-vis-new
    notes: >-
      Canal visible / GeoColor GOES-16. Tracé dans
      site-infoclimat/data/cartes/goes/getDataIRNew.php.

  - name: api://noaa/satepsanone-goes-west-ir4
    url_hint: http://satepsanone.nesdis.noaa.gov/pub/GIS/GOESwest/GoesWest04I4_latest.tif
    auth: none
    consumers:
      - cron.goes-ir4
    notes: >-
      Ancien endpoint GOES-West IR4. Tracé dans
      site-infoclimat/data/cartes/goes/getData.php. Potentiellement mort
      (satepsanone legacy).

  - name: api://noaa/satepsanone-goes-west-vis
    url_hint: http://satepsanone.nesdis.noaa.gov/pub/GIS/GOESeast/GoesEast1V_latest.tif
    auth: none
    consumers:
      - cron.goes-vis
    notes: >-
      Ancien endpoint GOES-East VIS. Tracé dans
      site-infoclimat/data/cartes/goes/getDataVisE.php. Potentiellement mort
      (satepsanone legacy).

  - name: api://noaa/mesonet-agron-nexrad-n0q
    url_hint: http://mesonet.agron.iastate.edu/data/gis/images/4326/USCOMP/n0q_0.tif.Z
    auth: none
    consumers:
      - cron.nexrad
    notes: >-
      Iowa State University mesonet NEXRAD composite. Tracé dans
      site-infoclimat/data/cartes/nexrad/getData.php.

  # ─── ECCC (Environnement et Changement climatique Canada) ──────────────────

  - name: api://eccc/model-gem-global
    url_hint: https://dd.weatheroffice.gc.ca/model_gem_global/
    auth: none
    consumers:
      - kestra.infoclimat.forecast.gem.fetch-gem-modeles-2
      - cron.recup-gem.modeles2
    notes: >-
      MSC Datamart GEM Global. URL confirmée dans reconciliation.md (correction
      post-revue).

  - name: api://eccc/ensemble-naefs
    url_hint: https://dd.weatheroffice.gc.ca/ensemble/naefs/
    auth: none
    consumers:
      - kestra.infoclimat.forecast.gemens.fetch-gemens-modeles-2
      - cron.recup-gemens.modeles2
    notes: >-
      Ensemble NAEFS (GEM-ENS). URL confirmée dans reconciliation.md.

  # ─── ECMWF ─────────────────────────────────────────────────────────────────

  - name: api://ecmwf/opendata
    url_hint: https://data.ecmwf.int/
    auth: none
    consumers:
      - kestra.infoclimat.forecast.ecmwf.fetch-ecmwf-modeles-2
      - cron.recup-ecmwf.modeles2
    notes: >-
      ECMWF open data (FTP data-portal.ecmwf.int → modeles/ECMWF/).
      URL confirmée dans reconciliation.md.

  # ─── PO.DAAC / NASA Earthdata ──────────────────────────────────────────────

  - name: api://podaac/sst-mur
    url_hint: https://archive.podaac.earthdata.nasa.gov/podaac-ops-cumulus-protected/MUR-JPL-L4-GLOB-v4.1/
    auth: compte
    consumers:
      - kestra.infoclimat.data.oceanic.compute-sea-surface-temperature-podaac
    notes: >-
      SST MUR JPL. Auth via NASA URS (urs.earthdata.nasa.gov), credentials en
      env NASA_API_USER / NASA_API_PASSWORD. Tracé dans
      site-infoclimat/data/cartes/ifremer/podaac_sst_MUR.php.

  - name: api://nasa/lance-modaps
    url_hint: https://lance3.modaps.eosdis.nasa.gov/imagery/subsets/
    auth: none
    consumers:
      - kestra.infoclimat.front.cron.sat-modis
      - cron.sat_modis
      - cron.sat-modis.front2
      - cron.sat-modis.nginx2
    notes: >-
      Imagerie MODIS Terra/Aqua LANCE. Tracé dans
      site-infoclimat/cron/sat_modis.php.

  - name: api://nasa/earthdata-wmts
    url_hint: https://map1c.vis.earthdata.nasa.gov/wmts-geo/wmts.cgi
    auth: none
    consumers:
      - cron.sat_modis
    notes: >-
      NASA Worldview WMTS capabilities. Tracé dans
      site-infoclimat/cron/sat_modis.php.

  - name: api://nasa/earthdata-wvs
    url_hint: https://wvs.earthdata.nasa.gov/api/v1/snapshot
    auth: none
    consumers:
      - kestra.infoclimat.front.cron.sat-modis-new
      - cron.sat-modis-new.front2
      - cron.sat-modis-new.nginx2
    notes: >-
      NASA Worldview Snapshots. Tracé dans
      site-infoclimat/cron/sat_modis_new.php.

  # ─── EUMETSAT ──────────────────────────────────────────────────────────────

  - name: api://eumetsat/eumetview-static-images
    url_hint: https://eumetview.eumetsat.int/static-images/latestImages/
    auth: none
    consumers:
      - cron.eumetsat
    notes: >-
      Images MSG statiques (NaturalColor, Airmass, WV062, Fog, Convection…).
      Tracé dans site-infoclimat/server5/eumetsat.php.

  # ─── KNMI ──────────────────────────────────────────────────────────────────

  - name: api://knmi/msg-cpp-products
    url_hint: https://anonymous.api.dataplatform.knmi.nl/wms/adaguc-server
    auth: none
    consumers:
      - kestra.infoclimat.data.sat-knmi
      - cron.sat-knmi.front2
      - cron.sat-knmi.nginx2
    notes: >-
      MSG Cloud Physical Properties via KNMI ADAGUC WCS. Tracé dans
      site-infoclimat/data/cartes/ifremer/sat_knmi.php (accès anonyme).

  - name: api://knmi/msgcpp-adaguc-wms
    url_hint: https://msgcpp-adaguc.knmi.nl/adaguc-server/
    auth: none
    consumers:
      - cron.knmi
    notes: >-
      Ancien endpoint KNMI ADAGUC WMS pour GetCapabilities. Tracé dans
      site-infoclimat/server5/knmi.php (commenté en faveur du nouveau endpoint,
      voir api://knmi/msg-cpp-products). Le pipeline cron.knmi reste ACTIF
      (srx-data-2 crontab:68, pipelines.yaml) — seul cet endpoint-ci est délaissé.

  # ─── UK Met Office ─────────────────────────────────────────────────────────

  - name: api://ukmet/wms-sat-ir
    url_hint: https://www.metoffice.gov.uk/public/data/LayerCache/
    auth: compte
    consumers:
      - cron.recup-ukmet
    notes: >-
      WMS satellite IR Met Office. Authentification HTTP (compte). Tracé dans
      site-infoclimat/cron/sat/recup_ukmet.py (HTTPS + referer).

  - name: api://ukmet/wms-sat-vis
    url_hint: https://www.metoffice.gov.uk/public/data/LayerCache/
    auth: compte
    consumers:
      - cron.recup-ukmet
    notes: >-
      WMS satellite visible Met Office. Même script et endpoint que wms-sat-ir.

  # ─── NICT (Japan) ──────────────────────────────────────────────────────────

  - name: api://nict/himawari8-latest-json
    url_hint: https://himawari8-dl.nict.go.jp/himawari8/img/D531106/latest.json
    auth: none
    consumers:
      - cron.himawari
    notes: >-
      Dernier horodatage Himawari-8/9. Tracé dans
      site-infoclimat/cron/sat/himawari.php.

  - name: api://nict/himawari8-img-full-24h
    url_hint: http://himawari8-dl.nict.go.jp/himawari8/img/D531106/16d/550/
    auth: none
    consumers:
      - cron.himawari
    notes: >-
      Tuiles image full-disk 16 segments. Tracé dans
      site-infoclimat/cron/sat/himawari.php.

  # ─── DLR ───────────────────────────────────────────────────────────────────

  - name: api://dlr.taurus/wetterbilder
    url_hint: ftp://taurus.caf.dlr.de/put/wetterbilder/
    auth: none
    consumers:
      - cron.sat_modis
    notes: >-
      Images satellite HD (France, Italie) via FTP DLR. Tracé dans
      site-infoclimat/cron/sat_modis.php.

  # ─── sat24 ─────────────────────────────────────────────────────────────────

  - name: api://sat24/image-fr
    url_hint: http://fr.sat24.com/image/?region=fr&type=
    auth: none
    consumers:
      - cron.image
    notes: >-
      Images satellite sat24 France (visible + infraPolair). Tracé dans
      site-infoclimat/cron/image.php.

  - name: api://sat24/image-fr-visible
    url_hint: http://www.sat24.com/image2.ashx?region=fr&ir=False
    auth: none
    consumers:
      - cron.sat24
    notes: >-
      Image visible sat24 France. Tracé dans
      site-infoclimat/cron/sat24.php.

  - name: api://sat24/image-europe-ir
    url_hint: http://www.sat24.com/image2.ashx?region=eu&ir=True
    auth: none
    consumers:
      - cron.colorise
    notes: >-
      Image infrarouge Europe sat24. Tracé dans
      site-infoclimat/cron/colorise.php.

  - name: api://sat24/image-infrarouge-polaire
    url_hint: http://fr.sat24.com/image/?region=eu&type=infraPolair
    auth: none
    consumers:
      - cron.colorise.srx-data-2
      - cron.compo-new
    notes: >-
      Image infrarouge polaire Europe sat24. Tracé dans
      site-infoclimat/cron/colorise.php.

  # ─── meteox ────────────────────────────────────────────────────────────────

  - name: api://meteox/radar-europe
    url_hint: http://www2.meteox.com/radareu.php
    auth: none
    consumers:
      - cron.radar
      - cron.image
    notes: >-
      Mosaïque radar Europe meteox. Tracé dans
      site-infoclimat/cron/radar.php et image.php.

  # ─── meteomedia ────────────────────────────────────────────────────────────

  - name: api://meteomedia/radar-frankreich
    url_hint: http://data.meteomedia.de/data/layers/frankreich/
    auth: none
    consumers:
      - cron.compo-new-1
    notes: >-
      Radar MeteoMedia Allemagne (couverture France + régions). Tracé dans
      site-infoclimat/cron/compo_new_1.php.

  - name: api://meteomedia/radar
    url_hint: http://data.meteomedia.de/data/layers/
    auth: none
    consumers:
      - kestra.infoclimat.data.cartes.radar.compo-new-1
    notes: >-
      Même source que radar-frankreich, pipeline Kestra. Tracé dans
      site-infoclimat/include/meteomedia/meteomedia.php.

  # ─── meteocentre ───────────────────────────────────────────────────────────

  - name: api://meteocentre/upperair
    url_hint: http://meteocentre.com/upperair/images/
    auth: none
    consumers:
      - kestra.infoclimat.front.cron.radio-map
      - cron.radioMap
      - cron.radiomap.front2
      - cron.radiomap.nginx2
    notes: >-
      Radiosondages upperair meteocentre. Tracé dans
      site-infoclimat/cron/radioMap.php.

  - name: api://meteocentre/lightning-foudre
    url_hint: http://meteocentre.com/lightning/fr_anim/foudrefr_zeus.
    auth: none
    consumers:
      - cron.image
    notes: >-
      Image foudre animée meteocentre. Tracé dans
      site-infoclimat/cron/image.php.

  - name: api://meteocentre/lightning-anim
    url_hint: http://meteocentre.com/lightning/fr_anim/foudrefr_zeus.
    auth: none
    consumers:
      - cron.anim-foudre
    notes: >-
      Animation foudre (frames multiples). Tracé dans
      site-infoclimat/cron/anim_foudre.php.

  - name: api://meteocentre/meteoalerte-zones
    url_hint: http://meteocentre.com/meteoalerte/france/
    auth: none
    consumers:
      - kestra.infoclimat.data.meteoalerte.cache
      - cron.meteoalerte-mise_en_cache-legacy
      - cron.meteoalerte-mise_en_cache-v5
      - cron.meteoalerte-cache.front2
      - cron.meteoalerte-cache.nginx2
    notes: >-
      Images GIF zones meteoalerte par département depuis meteocentre.
      Tracé dans site-infoclimat/meteoalerte/mise_en_cache.php.

  # ─── meteoalerte (partenaire) ───────────────────────────────────────────────

  - name: api://meteoalerte/exchange_ic
    url_hint: https://meteoalerte.com/france/exchange_ic/send_obs.php
    auth: token
    consumers:
      - kestra.infoclimat.data.meteoalerte.synchro-ma
      - cron.transfert-ma.front2
      - cron.transfert-ma.nginx2
    notes: >-
      Échange IC↔MétéoAlerte (observations). Token HTTP_X_MY_TOKEN.
      Tracé dans site-infoclimat/data/ic_meteonet/transfert.php.

  - name: api://meteoalerte/exchange_ic-stats
    url_hint: http://meteoalerte.com/france/exchange_ic/stats.php
    auth: none
    consumers:
      - kestra.infoclimat.data.meteoalerte.cache
      - cron.meteoalerte-mise_en_cache-legacy
      - cron.meteoalerte-mise_en_cache-v5
      - cron.meteoalerte-cache.front2
      - cron.meteoalerte-cache.nginx2
    notes: >-
      Statistiques meteoalerte (all/orage/pluie/neige/vents/brouillard…).
      Tracé dans site-infoclimat/meteoalerte/mise_en_cache.php.

  # ─── vigicrues / eaufrance ─────────────────────────────────────────────────

  - name: api://vigicrues/InfoVigiCru
    url_hint: https://www.vigicrues.gouv.fr/services/1/InfoVigiCru.geojson
    auth: none
    consumers:
      - kestra.infoclimat.data.vigicrues
      - cron.vigicrues.front2
      - cron.vigicrues.nginx2
    notes: >-
      GeoJSON vigilance crues. Tracé dans
