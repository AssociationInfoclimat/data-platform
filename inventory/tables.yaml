# Inventaire des tables référencées dans le code des 23 repos — inventaire 2026-06
# Schéma d'une entrée :
#   name:          mariadb://<base>/<table> | timescaledb://postgres/<table>
#                  (tokens motifs : {AAAA}/{YYYY}=année, {MM}=mois, {1-3}=décade,
#                   {dd}=jour, {XX}=code 2 lettres pays/param — ex. geoNames_{XX}, eca_{XX}_{XX})
#   partitioning:  none | "par année (V5_data_{AAAA})" | "par mois/décade (static_{MM}_d{1-3})" | autre
#   personal_data: true si colonnes nominatives/IP/email repérées en passant (graine registre RGPD)
#   engine_hint:   indication trouvée dans le code (MEMORY, MyISAM...) ou null
#   writers:       ["<repo>:<fichier>", ...]  # INSERT/UPDATE/DELETE/REPLACE/LOAD DATA
#   readers:       ["<repo>:<fichier>", ...]  # SELECT (échantillon représentatif, pas exhaustif si >10 : noter "+N autres")
#   status:        actif | douteux | mort
#   notes:
