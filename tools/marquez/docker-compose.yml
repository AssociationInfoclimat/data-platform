# Marquez local pour la validation du lineage.
# Stack volontairement séparée de dev-env : usage outillage data-platform uniquement.
# API : http://localhost:5002 — UI : http://localhost:3000
# (port hôte 5002 : sur macOS, AirPlay Receiver occupe le port 5000)

services:
  marquez-api:
    image: marquezproject/marquez:0.50.0
    environment:
      MARQUEZ_PORT: 5000
      MARQUEZ_ADMIN_PORT: 5001
      POSTGRES_HOST: marquez-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: marquez
      POSTGRES_USER: marquez
      POSTGRES_PASSWORD: marquez
    ports:
      - "127.0.0.1:5002:5000"
      - "127.0.0.1:5003:5001"
    depends_on:
      - marquez-db

  marquez-web:
    image: marquezproject/marquez-web:0.50.0
    environment:
      MARQUEZ_HOST: marquez-api
      MARQUEZ_PORT: 5000
      WEB_PORT: 3000
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - marquez-api

  marquez-db:
    image: postgres:14
    environment:
      POSTGRES_DB: marquez
      POSTGRES_USER: marquez
      POSTGRES_PASSWORD: marquez
    volumes:
      - marquez-pgdata:/var/lib/postgresql/data

volumes:
  marquez-pgdata:
