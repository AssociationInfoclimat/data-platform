# Périmètre d'indexation du code Infoclimat → embeddings → LanceDB.
#
# Les repos sont cherchés sous `base_dir` (défaut : le dossier parent de data-platform,
# là où vivent les clones siblings ; surchargeable par CODE_INDEX_BASE_DIR).
# Première itération : repos cœur. Ajouter une ligne à `repos` suffit pour étendre.

base_dir: ".."

repos:
  - site-infoclimat
  - infrapilot
  - modeles-ncl
  - modeles-php
  - python-climate-services
  - data-platform
  - ic-data-bot
  - telechargement-climatologie-meteo-data-gouv
  - telechargement-climatologie-portail-api-meteofrance
  # Pipelines/sources de données référencés par l'inventaire/lineage de la data-platform
  - calc-indicateur-realtime
  - calc-yearly-acc
  - download-convert-and-generate-accumulations
  - podaac-sst-mur
  - mapserver
  - serveur-station-autonome
  - cron-infoclimat
  - php-fpm-7_4-timescale-api

# Extensions indexées (code, conf, docs). `.map` = mapfiles MapServer → conservés ;
# les source-maps JS/CSS (`*.js.map`, `*.css.map`) sont retirées via exclude_globs.
include_ext:
  - .php
  - .js
  - .ts
  - .py
  - .ncl
  - .sh
  - .sql
  - .yaml
  - .yml
  - .json
  - .xml
  - .jinja2
  - .j2
  - .conf
  - .ini
  - .toml
  - .md
  - .map

# Dossiers jamais descendus (comparaison par nom de segment).
exclude_dirs:
  - .git
  - node_modules
  - vendor
  - .venv
  - venv
  - __pycache__
  - .pytest_cache
  - .mypy_cache
  - .idea
  - .vscode
  - dist
  - build
  - .lancedb        # index vectoriel lui-même (fichiers internes LanceDB)
  - snapshot        # snapshot data-platform cloné par ic-data-bot (doublon)

# Motifs de fichiers exclus (fnmatch sur le chemin relatif et sur le nom de base).
exclude_globs:
  - "*.min.js"
  - "*.min.css"
  - "*.js.map"          # source-maps JS (pas les mapfiles MapServer)
  - "*.css.map"
  - "*.bundle.js"
  - "*.lock"
  - "package-lock.json"
  - "composer.lock"
  - "uv.lock"
  - "poetry.lock"

# ── Corpus « docs » : gouvernance data-platform (table docs_chunks, modèle texte) ──
# Chemins RELATIFS au repo data-platform (résolus sous base_dir/data-platform). Chunking par
# entrée (cf. chunk_structured) ; CSV de volumétrie et *.sql.gz exclus (servis par les outils
# volumetrie/schema, pas embeddés).
docs:
  repo: data-platform
  include_globs:
    - "contracts/*.odcs.yaml"
    - "inventory/*.yaml"
    - "catalog/*.yaml"
    - "catalog/glossary.md"
    - "catalog/datasets/*.md"
    - "audits/**/*.yaml"
    - "README.md"
    - "lineage/*.md"
