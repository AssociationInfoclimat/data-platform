apiVersion: v3.0.2
kind: DataContract
id: urn:infoclimat:contract:source-meteofrance-dppaquetradar
name: Paquets radar (DPPaquetRadar)
version: "1.0.0"
status: active
domain: radar
tags: [source, meteofrance, api]

description:
  purpose: >-
    Contrat de la SOURCE API DPPaquetRadar — paquets radar compressés (tar gzip)
    couvrant le quart d'heure récent pour mosaïques ou stations individuelles.
  usage: >-
    Consommé par les pipelines d'ingestion radar en mode paquet. Format binaire
    (tar gzip), non tabulaire.
  limitations: >-
    Archive tar gzip binaire. /station/paquet requiert id_station.

servers:
  - server: meteofrance-dppaquetradar
    type: api
    environment: production
    location: https://public-api.meteofrance.fr/public/DPPaquetRadar/v1

schema:
  - name: paquet-radar
    physicalType: binary
    description: Archive tar gzip de produits radar.
    properties: []

customProperties:
  - property: externalSource
    value:
      apiId: DPPaquetRadar
      host: public-api.meteofrance.fr
      context: /public/DPPaquetRadar/v1
      urlTemplate: "/public/DPPaquetRadar/v1/mosaique/paquet | /station/paquet"
      auth: token
      probeUrl: https://public-api.meteofrance.fr/public/DPPaquetRadar/v1/liste-stations
      verified: "✅ vérifié en live"
      unitsNote: Archive tar gzip (binaire).
      descriptor: ""
      quirks:
        - "/mosaique/paquet = tar gzip du ¼h récent (~16 Mo). /station/paquet → 422 sans id_station = route OK."
  - property: changelog
    value:
      - version: "1.0.0"
        date: "2026-06-10"
        type: initial
        severity: non-breaking
        fields: []
        note: Transcription du dict.

team:
  - username: pam
    role: owner
    description: Data engineer de l'association — responsable du contrat.

support:
  - channel: data
    tool: email
    url: mailto:pamahe@proton.me
