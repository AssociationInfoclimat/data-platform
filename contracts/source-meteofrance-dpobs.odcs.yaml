apiVersion: v3.0.2
kind: DataContract
id: urn:infoclimat:contract:source-meteofrance-dpobs
name: Source Météo-France — Observations stations (DPObs)
version: 2.0.0
status: active
domain: observations
tags: [source, meteofrance, api]

description:
  purpose: >-
    Contrat de la SOURCE API DPObs (observations stations RADOME, temps réel) — schéma
    brut tel que renvoyé par l'API, distinct des tables persistées qui en dérivent.
  usage: >-
    Consommé par les pipelines d'ingestion observations. Schéma en unités SI BRUTES.
  limitations: >-
    Pas d'indicateur qualité Q* sur le flux temps réel (≠ climato).

servers:
  - server: meteofrance-dpobs
    type: api
    environment: production
    location: https://public-api.meteofrance.fr/public/DPObs/v2

schema:
  - name: station-observation
    physicalType: object
    description: Observation horaire/infrahoraire d'une station, réponse JSON.
    properties:
      - name: geo_id_insee
        physicalType: TEXT
        unit: ddnnnpp
        description: ID point (département+commune Insee+précision site)
      - name: lat
        physicalType: REAL
        unit: degré
        description: latitude du poste
      - name: lon
        physicalType: REAL
        unit: degré
        description: longitude du poste
      - name: reference_time
        physicalType: TEXT
        unit: ISO 8601 UTC
        description: production de la donnée
      - name: validity_time
        physicalType: TEXT
        unit: ISO 8601 UTC
        description: validité (clé temporelle)
      - name: t
        physicalType: REAL
        unit: K (Kelvin)
        description: température sous abri (SI brut)
      - name: td
        physicalType: REAL
        unit: K (Kelvin)
        description: point de rosée sous abri (SI brut)
      - name: tx
        physicalType: REAL
        unit: K
        description: T max sur la période (horaire)
      - name: tn
        physicalType: REAL
        unit: K
        description: T min sur la période (horaire)
      - name: u
        physicalType: INTEGER
        unit: "%"
        description: humidité relative
      - name: dd
        physicalType: INTEGER
        unit: degré (rose 360)
        description: direction du vent moyen
      - name: ff
        physicalType: REAL
        unit: m/s
        description: vent moyen à 10 m
      # Rafales : la v2 ne RENOMME pas — elle CRÉE de nouvelles variables (rafale moyennée
      # sur 3 s, référence OMM) et DÉPRÉCIE les anciennes (mesure instantanée, nom v1 conservé).
      # La grandeur mesurée change → valeurs NON équivalentes, pas un simple alias.
      - name: raf
        physicalType: REAL
        unit: m/s
        description: >-
          [v2, ACTIVE] rafale max horaire — NOUVELLE variable, rafale moyennée sur 3 s
          (référence OMM). Remplace fxi (mesure différente : fxi = instantané).
      - name: ddraf
        physicalType: INTEGER
        unit: degré (rose 360)
        description: "[v2, ACTIVE] direction de la rafale horaire (raf). Nouvelle variable, remplace dxi."
      - name: raf10
        physicalType: REAL
        unit: m/s
        description: "[v2, ACTIVE] rafale max 10 min (infrahoraire-6m), moyennée 3 s. Nouvelle variable, remplace fxi10."
      - name: ddraf10
        physicalType: INTEGER
        unit: degré (rose 360)
        description: "[v2, ACTIVE] direction de la rafale 10 min (raf10). Nouvelle variable, remplace dxi10."
      - name: fxi
        physicalType: REAL
        unit: m/s
        deprecated: true
        description: >-
          [v1, DÉPRÉCIÉE] rafale max horaire INSTANTANÉE — conserve son nom v1 ; NON ALIMENTÉE
          (vide) depuis 2026-06-16, endpoint v1 supprimé le 2026-12-01. ≠ raf (mesure 3 s).
      - name: dxi
        physicalType: INTEGER
        unit: degré (rose 360)
        deprecated: true
        description: "[v1, DÉPRÉCIÉE] direction de fxi — vidée depuis 2026-06-16, supprimée le 2026-12-01."
      - name: fxi10
        physicalType: REAL
        unit: m/s
        deprecated: true
        description: >-
          [v1, DÉPRÉCIÉE] rafale max 10 min INSTANTANÉE — conserve son nom v1 ; vidée depuis
          2026-06-16, supprimée le 2026-12-01. Remplacée par raf10 (mesure 3 s, valeurs différentes).
      - name: dxi10
        physicalType: INTEGER
        unit: degré (rose 360)
        deprecated: true
        description: "[v1, DÉPRÉCIÉE] direction de fxi10 — vidée depuis 2026-06-16, supprimée le 2026-12-01."
      - name: rr1
        physicalType: REAL
        unit: mm
        description: précipitations (1 h horaire / 6 min infra)
      - name: t_10
        physicalType: REAL
        unit: K
        description: température du sol à 10 cm (idem t_20/t_50/t_100)
      - name: vv
        physicalType: INTEGER
        unit: m
        description: visibilité horizontale
      - name: pres
        physicalType: REAL
        unit: Pa (Pascal)
        description: pression station (SI brut)
      - name: pmer
        physicalType: REAL
        unit: Pa (Pascal)
        description: pression niveau mer (SI brut)
      - name: insolh
        physicalType: REAL
        unit: min
        description: durée d'insolation sur la période
      - name: ray_glo01
        physicalType: REAL
        unit: J/m²
        description: rayonnement global sur la période
      - name: rr_per
        physicalType: REAL
        unit: mm
        description: précipitations sur la période (pas infrahoraire 6 min)
      - name: insert_time
        physicalType: TEXT
        unit: ISO 8601 UTC
        description: horodatage d'insertion de la donnée
      - name: etat_sol
        physicalType: INTEGER
        unit: code
        description: état du sol
      - name: sss
        physicalType: REAL
        unit: cm
        description: hauteur de neige fraîche / au sol

customProperties:
  - property: externalSource
    value:
      apiId: DPObs
      docUrl: "https://confluence-meteofrance.atlassian.net/wiki/spaces/OpenDataMeteoFrance/pages/853639294/"
      host: public-api.meteofrance.fr
      context: /public/DPObs/v2
      urlTemplate: /public/DPObs/v2/station/{horaire|infrahoraire-6m}?id_station={id}&format=json
      auth: token
      probeUrl: https://public-api.meteofrance.fr/public/DPObs/v2/liste-stations
      verified: "✅ v2 déployée le 2026-06-08 (cf. Confluence MF)"
      unitsNote: >-
        ⚠️ Unités SI BRUTES dans la réponse API : température en KELVIN, pression en PASCAL.
        Les tables persistées (tool `schema`) convertissent en °C / hPa.
      descriptor: docs/mf/observations/{horaire,infrahoraire}.csv (descripteur officiel MF complet)
      quirks:
        - >-
          3 sous-produits : (1) TERRESTRE — /liste-stations, /station/horaire,
          /station/infrahoraire-6m ; id 8 chiffres (geo_id_insee, zéro initial OBLIGATOIRE dépt 01–09,
          sinon 400 « Identifiant station sémantiquement incorrect ») ; rétention 24 h.
        - >-
          (2) SYNOP — /liste-stations-synop, /synop ; id OMM 5 chiffres (geo_id_wmo, zéro initial) ;
          tri-horaire ; rétention 5 jours ; params date_debut/date_fin.
        - >-
          (3) BOUÉES — /liste-bouees, /bouees ; id 7 chiffres (id_bouees) ; horaire ; rétention 5 jours.
        - Stations RADOME (2000+). Formats CSV / JSON / GeoJSON (format=…).
        - >-
          v1 (/public/DPObs/v1) DÉPRÉCIÉE : paramètres rafale v1 (fxi/dxi/fxi10/dxi10) NON
          ALIMENTÉS depuis 2026-06-16, ARRÊT v1 le 2026-12-01 — migrer vers /v2 (raf/ddraf/raf10/ddraf10).
        - "Bouée (/bouee) : fxi→rafper, per_fxi→per en v2. /synop : aucun changement v2."
        - >-
          ⚠️ HARMONISATION IDENTIFIANTS le 2026-04-16 : valeurs de num_poste/geo_id_insee CHANGÉES pour
          ~15 stations (rattachement de commune → nouveau code INSEE, ex. ROUSSET 05127001→04033001),
          bascule directe SANS cohabitation. Cf. changelog (referentiel, breaking).
  - property: changelog
    value:
      - version: "2.0.0"
        date: "2026-06-08"
        type: replace
        severity: breaking
        deprecated_fields: [fxi, dxi, fxi10, dxi10]
        added_fields: [raf, ddraf, raf10, ddraf10]
        fields: [fxi, dxi, fxi10, dxi10, raf, ddraf, raf10, ddraf10]
        note: >-
          API Observations v1 → v2 (nouveaux endpoints /public/DPObs/v2). Ce n'est PAS un simple
          renommage : MF DÉPRÉCIE les variables rafale v1 (mesure instantanée — fxi, dxi, fxi10,
          dxi10 ; nom conservé, vidées depuis 2026-06-16, supprimées le 2026-12-01) et CRÉE de
          nouvelles variables (rafale moyennée sur 3 s, référence OMM — raf, ddraf, raf10, ddraf10).
          La grandeur mesurée change, donc les valeurs ne sont PAS équivalentes (pas de simple
          mapping fxi→raf). Correspondance des nouveaux noms : horaire fxi→raf / dxi→ddraf ;
          infrahoraire-6m fxi10→raf10 / dxi10→ddraf10 ; bouée fxi→rafper / per_fxi→per ;
          /synop inchangé. Déploiement v2 le 2026-06-08 ; v1 vidée le 2026-06-16 ; arrêt v1 le
          2026-12-01. Source : Confluence MF (page 1688633417). NB : FXI3S (rafale 3 s) est un
          champ de la CLIMATOLOGIE (DPClim), distinct de ces variables temps réel.
      - version: "1.1.0"
        date: "2026-04-16"
        type: referentiel
        severity: breaking
        fields: [num_poste, geo_id_insee, num_dep, commune]
        note: >-
          Harmonisation des identifiants de stations (changement de VALEURS, pas de format) :
          num_poste/geo_id_insee modifiés pour ~15 stations dont la commune de rattachement a
          changé (nouveau code INSEE — ex. ROUSSET 05127001→04033001, PEGOMAS-TANNERON
          06090001→83133003, JOINVILLE-LE-PONT 75044001→94046003). Bascule directe le 2026-04-16
          SANS période de cohabitation → toute jointure/référentiel sur l'identifiant casse.
          Touche aussi DPPaquetObs, DPClim et meteo.data.gouv. Source : Confluence MF (page 1603796993).
      - version: "1.0.0"
        date: "2026-06-01"
        type: initial
        severity: non-breaking
        fields: []
        note: Transcription du dict meteofrance_catalog (état vérifié en live).

team:
  - username: pam
    role: owner
    description: Data engineer de l'association — responsable du contrat.

support:
  - channel: data
    tool: email
    url: mailto:pamahe@proton.me
