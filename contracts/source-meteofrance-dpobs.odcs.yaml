apiVersion: v3.0.2
kind: DataContract
id: urn:infoclimat:contract:source-meteofrance-dpobs
name: Source Météo-France — Observations stations (DPObs)
version: 2.0.0
status: active
domain: observations
tags: [source, meteofrance, api]

description:
  purpose: >-
    Contrat de la SOURCE API DPObs (observations stations RADOME, temps réel) — schéma
    brut tel que renvoyé par l'API, distinct des tables persistées qui en dérivent.
  usage: >-
    Consommé par les pipelines d'ingestion observations. Schéma en unités SI BRUTES.
  limitations: >-
    Pas d'indicateur qualité Q* sur le flux temps réel (≠ climato).

servers:
  - server: meteofrance-dpobs
    type: api
    environment: production
    location: https://public-api.meteofrance.fr/public/DPObs/v2

schema:
  - name: station-observation
    physicalType: object
    description: Observation horaire/infrahoraire d'une station, réponse JSON.
    properties:
      - name: geo_id_insee
        physicalType: TEXT
        unit: ddnnnpp
        description: ID point (département+commune Insee+précision site)
      - name: lat
        physicalType: REAL
        unit: degré
        description: latitude du poste
      - name: lon
        physicalType: REAL
        unit: degré
        description: longitude du poste
      - name: reference_time
        physicalType: TEXT
        unit: ISO 8601 UTC
        description: production de la donnée
      - name: validity_time
        physicalType: TEXT
        unit: ISO 8601 UTC
        description: validité (clé temporelle)
      - name: t
        physicalType: REAL
        unit: K (Kelvin)
        description: température sous abri (SI brut)
      - name: td
        physicalType: REAL
        unit: K (Kelvin)
        description: point de rosée sous abri (SI brut)
      - name: tx
        physicalType: REAL
        unit: K
        description: T max sur la période (horaire)
      - name: tn
        physicalType: REAL
        unit: K
        description: T min sur la période (horaire)
      - name: u
        physicalType: INTEGER
        unit: "%"
        description: humidité relative
      - name: dd
        physicalType: INTEGER
        unit: degré (rose 360)
        description: direction du vent moyen
      - name: ff
        physicalType: REAL
        unit: m/s
        description: vent moyen à 10 m
      - name: raf
        physicalType: REAL
        unit: m/s
        description: "rafale max horaire (v2, /station/horaire ; ex-`fxi` v1)"
      - name: ddraf
        physicalType: INTEGER
        unit: degré (rose 360)
        description: "direction de la rafale horaire (v2 ; ex-`dxi` v1)"
      - name: raf10
        physicalType: REAL
        unit: m/s
        description: "rafale max 10 min (v2, /station/infrahoraire-6m ; ex-`fxi10` v1)"
      - name: ddraf10
        physicalType: INTEGER
        unit: degré (rose 360)
        description: "direction de la rafale 10 min (v2 ; ex-`dxi10` v1)"
      - name: fxi10
        physicalType: REAL
        unit: m/s
        description: >-
          rafale max 10 min — paramètre v1 RENOMMÉ `raf10` en v2 ; champ v1 NON ALIMENTÉ
          (vide) depuis 2026-06-16, endpoint v1 supprimé le 2026-12-01. (idem fxi→raf, dxi→ddraf)
      - name: rr1
        physicalType: REAL
        unit: mm
        description: précipitations (1 h horaire / 6 min infra)
      - name: t_10
        physicalType: REAL
        unit: K
        description: température du sol à 10 cm (idem t_20/t_50/t_100)
      - name: vv
        physicalType: INTEGER
        unit: m
        description: visibilité horizontale
      - name: pres
        physicalType: REAL
        unit: Pa (Pascal)
        description: pression station (SI brut)
      - name: pmer
        physicalType: REAL
        unit: Pa (Pascal)
        description: pression niveau mer (SI brut)
      - name: insolh
        physicalType: REAL
        unit: min
        description: durée d'insolation sur la période
      - name: ray_glo01
        physicalType: REAL
        unit: J/m²
        description: rayonnement global sur la période

customProperties:
  - property: externalSource
    value:
      apiId: DPObs
      host: public-api.meteofrance.fr
      context: /public/DPObs/v2
      urlTemplate: /public/DPObs/v2/station/{horaire|infrahoraire-6m}?id_station={id}&format=json
      auth: token
      probeUrl: https://public-api.meteofrance.fr/public/DPObs/v2/liste-stations
      verified: "✅ v2 déployée le 2026-06-08 (cf. Confluence MF)"
      unitsNote: >-
        ⚠️ Unités SI BRUTES dans la réponse API : température en KELVIN, pression en PASCAL.
        Les tables persistées (tool `schema`) convertissent en °C / hPa.
      descriptor: docs/mf/observations/{horaire,infrahoraire}.csv (descripteur officiel MF complet)
      quirks:
        - Stations RADOME (2000+), 24 dernières heures. CSV ou JSON (format=json).
        - /liste-stations, /station/horaire, /station/infrahoraire-6m (pas 6 min), /synop, /bouees.
        - >-
          v1 (/public/DPObs/v1) DÉPRÉCIÉE : paramètres rafale v1 (fxi/dxi/fxi10/dxi10) NON
          ALIMENTÉS depuis 2026-06-16, ARRÊT v1 le 2026-12-01 — migrer vers /v2 (raf/ddraf/raf10/ddraf10).
        - "Bouée (/bouee) : fxi→rafper, per_fxi→per en v2. /synop : aucun changement v2."
  - property: changelog
    value:
      - version: "2.0.0"
        date: "2026-06-08"
        type: rename
        severity: breaking
        fields: [fxi, dxi, fxi10, dxi10, raf, ddraf, raf10, ddraf10]
        note: >-
          API Observations v1 → v2 (nouveaux endpoints /public/DPObs/v2). RENOMMAGE des
          paramètres rafale pour conformité OMM / cohérence avec les homologues européens :
          horaire fxi→raf, dxi→ddraf ; infrahoraire-6m fxi10→raf10, dxi10→ddraf10 ;
          bouée fxi→rafper, per_fxi→per ; /synop inchangé. Calendrier MF : déploiement v2
          le 2026-06-08 ; paramètres v1 fxi/dxi NON ALIMENTÉS (vides) depuis 2026-06-16 ;
          ARRÊT définitif de v1 le 2026-12-01. Source : Confluence MF « Évolution de la
          nomenclature des rafales dans l'API Observations » (page 1688633417).
          NB : FXI3S (rafale 3 s) est un champ de la CLIMATOLOGIE (DPClim), à NE PAS
          confondre avec ce renommage temps réel.
      - version: "1.0.0"
        date: "2026-06-01"
        type: initial
        severity: non-breaking
        fields: []
        note: Transcription du dict meteofrance_catalog (état vérifié en live).

team:
  - username: pam
    role: owner
    description: Data engineer de l'association — responsable du contrat.

support:
  - channel: data
    tool: email
    url: mailto:pamahe@proton.me
