apiVersion: v3.0.2
kind: DataContract
id: urn:infoclimat:contract:source-meteofrance-dpradar
name: Données radar (DPRadar)
version: "1.0.0"
status: active
domain: radar
tags: [source, meteofrance, api]

description:
  purpose: >-
    Contrat de la SOURCE API DPRadar — données radar en temps réel (mosaïques et
    stations), fréquence 5 minutes, produits réflectivité/lame d'eau/PAM/PAG.
  usage: >-
    Consommé par les pipelines d'ingestion radar (HDF5/BUFR/PNG selon le produit
    demandé). Non tabulaire.
  limitations: >-
    Pas de schéma tabulaire. Zones via /mosaiques — FRANCE retourne 404.

servers:
  - server: meteofrance-dpradar
    type: api
    environment: production
    location: https://public-api.meteofrance.fr/public/DPRadar

schema:
  - name: radar-produit
    physicalType: binary
    description: "Produit radar (HDF5/BUFR/PNG) — pas un schéma tabulaire."
    properties: []

customProperties:
  - property: externalSource
    value:
      apiId: DPRadar
      host: public-api.meteofrance.fr
      context: /public/DPRadar
      urlTemplate: "/public/DPRadar/mosaiques/{zone}/observations/{observation}/produit | /stations/{id}/..."
      auth: token
      probeUrl: https://public-api.meteofrance.fr/public/DPRadar/mosaiques
      verified: "✅ vérifié en live"
      unitsNote: "Produits radar (HDF5/BUFR/PNG selon /produit) ; pas un schéma tabulaire."
      descriptor: "/liste-stations (CSV : id, nom, ref produit PAG/PAM, tours d'antenne)"
      quirks:
        - "Liens canoniques SANS /v1/ (alias /v1/ accepté). Fréquence 5 min."
        - "Zones via /mosaiques (METROPOLE, ANTILLES…) — `FRANCE` → 404. Produits : réflectivité, lame d'eau, PAM, PAG."
  - property: changelog
    value:
      - version: "1.0.0"
        date: "2026-06-10"
        type: initial
        severity: non-breaking
        fields: []
        note: Transcription du dict.

team:
  - username: pam
    role: owner
    description: Data engineer de l'association — responsable du contrat.

support:
  - channel: data
    tool: email
    url: mailto:pamahe@proton.me
