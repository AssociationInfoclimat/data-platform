apiVersion: v3.0.2
kind: DataContract
id: urn:infoclimat:contract:source-meteofrance-dppaquetobs
name: "Paquets d'observations (DPPaquetObs)"
version: "2.0.0"
status: active
domain: observations
tags: [source, meteofrance, api]

description:
  purpose: >-
    Contrat de la SOURCE API DPPaquetObs — observations stations groupées par paquets
    (24 h par station/département, ou toutes stations pour un horaire donné).
  usage: >-
    Consommé par les pipelines d'ingestion observations en mode paquet (batch).
    Mêmes mnémoniques que DPObs (geo_id_insee, t, ff, rr1…).
  limitations: >-
    Pas d'indicateur qualité Q* sur le flux temps réel (idem DPObs).

servers:
  - server: meteofrance-dppaquetobs
    type: api
    environment: production
    location: https://public-api.meteofrance.fr/public/DPPaquetObs/v2

schema:
  - name: paquet-observations
    physicalType: object
    description: "Paquets d'observations stations — mêmes champs que DPObs, groupés."
    properties: []

customProperties:
  - property: externalSource
    value:
      apiId: DPPaquetObs
      host: public-api.meteofrance.fr
      context: /public/DPPaquetObs/v2
      urlTemplate: "/public/DPPaquetObs/v2/paquet/{horaire|infrahoraire-6m} | /paquet/stations/{horaire|infrahoraire-6m}"
      auth: token
      probeUrl: https://public-api.meteofrance.fr/public/DPPaquetObs/v2/liste-stations
      verified: "✅ v2 déployée le 2026-06-08 (cf. Confluence MF)"
      unitsNote: >-
        ⚠️ Unités SI BRUTES dans la réponse API : température en KELVIN, pression en PASCAL.
        Les tables persistées (tool `schema`) convertissent en °C / hPa. Mêmes mnémoniques que DPObs (geo_id_insee, t, ff, rr1…).
      descriptor: "docs/mf/observations/ (mêmes champs que DPObs, groupés par paquet)"
      quality: "Idem DPObs (pas de Q*)."
      quirks:
        - "Paquets groupés : 24 h par station/département, ou tous stations pour un horaire."
        - "/paquet/horaire → 400 sans paramètres requis (probablement id-departement/date) = route OK."
        - >-
          v2 (2026-06) : hérite du changement rafale de l'API Observations — DÉPRÉCIATION des
          variables v1 (fxi/dxi/fxi10/dxi10, mesure instantanée) + CRÉATION des nouvelles
          (raf/ddraf/raf10/ddraf10, rafale moyennée 3 s OMM). Pas un alias : valeurs différentes.
          v1 vidé depuis 2026-06-16, arrêt v1 2026-12-01.
        - >-
          ⚠️ HARMONISATION IDENTIFIANTS le 2026-04-16 : valeurs num_poste/geo_id_insee changées pour
          ~15 stations (rattachement commune → nouveau INSEE), bascule sans cohabitation. Cf. changelog.
  - property: changelog
    value:
      - version: "2.0.0"
        date: "2026-06-08"
        type: replace
        severity: breaking
        deprecated_fields: [fxi, dxi, fxi10, dxi10]
        added_fields: [raf, ddraf, raf10, ddraf10]
        fields: [fxi, dxi, fxi10, dxi10, raf, ddraf, raf10, ddraf10]
        note: >-
          API Observations v1 → v2 (endpoints /public/DPPaquetObs/v2), mêmes mnémoniques que
          DPObs. PAS un renommage : MF DÉPRÉCIE les variables rafale v1 (mesure instantanée —
          fxi, dxi, fxi10, dxi10 ; nom conservé, vidées le 2026-06-16, supprimées le 2026-12-01)
          et CRÉE de nouvelles variables (rafale moyennée 3 s, OMM — raf, ddraf, raf10, ddraf10).
          Valeurs NON équivalentes. Correspondance : fxi→raf, dxi→ddraf, fxi10→raf10, dxi10→ddraf10
          (bouée fxi→rafper, per_fxi→per ; /synop inchangé). Déploiement v2 le 2026-06-08.
          Source : Confluence MF (page 1688633417). NB : FXI3S = champ CLIMATOLOGIE (DPClim).
      - version: "1.1.0"
        date: "2026-04-16"
        type: referentiel
        severity: breaking
        fields: [num_poste, geo_id_insee, num_dep, commune]
        note: >-
          Harmonisation des identifiants de stations (changement de VALEURS) : num_poste/geo_id_insee
          modifiés pour ~15 stations (rattachement de commune → nouveau code INSEE), bascule directe
          le 2026-04-16 sans cohabitation. Mêmes stations que DPObs. Source : Confluence MF (page 1603796993).
      - version: "1.0.0"
        date: "2026-06-01"
        type: initial
        severity: non-breaking
        fields: []
        note: Transcription du dict.

team:
  - username: pam
    role: owner
    description: Data engineer de l'association — responsable du contrat.

support:
  - channel: data
    tool: email
    url: mailto:pamahe@proton.me
