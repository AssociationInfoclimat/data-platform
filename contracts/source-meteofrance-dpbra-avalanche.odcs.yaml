apiVersion: v3.0.2
kind: DataContract
id: urn:infoclimat:contract:source-meteofrance-dpbra
name: "Source Météo-France — Bulletin Avalanche (DPBRA / BERA)"
version: "1.0.0"
status: active
domain: vigilance
tags: [source, meteofrance, api, non-consomme]

description:
  purpose: >-
    Contrat de la SOURCE API DPBRA — Bulletin d'Estimation du Risque d'Avalanche (BERA) par massif.
  usage: >-
    NON CONSOMMÉ par Infoclimat à ce jour (catalogue de référence). Source potentielle pour la neige
    de montagne. Saisonnier (saison hivernale).
  limitations: >-
    Disponible uniquement durant la saison couverte ; pas de schéma tabulaire (XML/GeoJSON/PNG).

servers:
  - server: meteofrance-dpbra
    type: api
    environment: production
    location: https://public-api.meteofrance.fr/public/DPBRA/v1

schema:
  - name: bulletin-avalanche
    physicalType: object
    description: "Bulletin BERA par massif (XML) + métadonnées massifs (GeoJSON) + images (PNG)."
    properties: []

customProperties:
  - property: externalSource
    value:
      apiId: DPBRA
      host: public-api.meteofrance.fr
      context: /public/DPBRA/v1
      docUrl: https://confluence-meteofrance.atlassian.net/wiki/spaces/OpenDataMeteoFrance/pages/854196230/
      urlTemplate: >-
        /public/DPBRA/v1/liste-massifs | /public/DPBRA/v1/massif/BRA?id-massif={id}
        | /public/DPBRA/v1/massif/image/rose-pentes | /public/DPBRA/v1/massif/image/montagne-enneigement
      auth: token
      probeUrl: https://public-api.meteofrance.fr/public/DPBRA/v1/liste-massifs
      verified: "✅ doc Confluence MF (854196230) — NON consommé par IC"
      unitsNote: "Données catégorielles (niveaux de risque). XML (bulletin), GeoJSON (massifs), PNG (images)."
      descriptor: "/liste-massifs (GeoJSON : id-massif, géométrie des massifs)"
      quirks:
        - "Saisonnier (saison hivernale) ; rétention 5 jours ; actualisation quotidienne a minima."
        - "Granularité = massif (param id-massif). Produits image : rose-pentes, montagne-enneigement."
        - "NON CONSOMMÉ par Infoclimat — inscrit au catalogue pour complétude / usage futur."
  - property: changelog
    value:
      - version: "1.0.0"
        date: "2026-06-18"
        type: initial
        severity: non-breaking
        fields: []
        note: "Ajout au catalogue (API MF non consommée). Sourcé sur Confluence MF page 854196230."

team:
  - username: pam
    role: owner
    description: Data engineer de l'association — responsable du contrat.

support:
  - channel: data
    tool: email
    url: mailto:pamahe@proton.me
