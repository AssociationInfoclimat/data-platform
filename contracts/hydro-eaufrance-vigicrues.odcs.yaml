apiVersion: v3.0.2
kind: DataContract
id: urn:infoclimat:contract:hydro-eaufrance-vigicrues
name: Hydrologie — Eaufrance / Vigicrues
version: 0.1.0
status: draft
domain: hydrologie
dataProduct: hydrologie-temps-reel

description:
  purpose: >-
    Données hydrologiques françaises agrégées par le site : hauteurs et débits des cours
    d'eau (API Hub'Eau / Eaufrance), référentiel des stations hydrométriques, et niveaux
    de vigilance crues par tronçon (Vigicrues). Alimente les pages hydro et les couches
    cartographiques rivières.
  usage: >-
    V5_climato.hydro : série temporelle (id_station, dh_utc) avec hauteur et débit,
    chacun accompagné de ses indicateurs qualité/méthode, colonne source. C'est la plus
    grosse table du parc MariaDB (~622 M lignes, 45 GiB). Référentiel dans
    V5_data_params.stations_hydro (géométrie point, cours d'eau, dates d'ouverture).
    Vigilance dans V5_climato.vigicrues (couleur 0-4 par tronçon).
  limitations: >-
    Dépend de la disponibilité des API publiques amont (Hub'Eau, Vigicrues) ; pas de
    politique de purge documentée malgré le volume. Les indicateurs qualité/méthode
    suivent la codification Eaufrance, non re-documentée ici.

tags:
  - hydrologie
  - time-series
  - eaufrance
  - vigicrues
  - mariadb

servers:
  - server: prod-mariadb
    type: mysql
    environment: production
    host: ${DB_HOST}
    port: 3306
    database: V5_climato

schema:
  - name: hydro
    physicalType: table
    description: Série temporelle hauteurs/débits (9 colonnes, ~622 M lignes)
    properties:
      - name: id_station
        physicalType: varchar(20)
        required: true
        description: Code station hydrométrique Eaufrance
      - name: dh_utc
        physicalType: datetime
        required: true
        description: Horodatage de la mesure (UTC)
      - name: hauteur
        physicalType: float
        description: Hauteur d'eau (m) — qualité hauteur_qualite, méthode hauteur_methode
      - name: debit
        physicalType: float
        description: Débit (m³/s) — qualité debit_qualite, méthode debit_methode
      - name: source
        physicalType: varchar(25)
        description: Source amont de la mesure
  - name: stations_hydro
    physicalType: table
    description: Référentiel des stations hydrométriques (14 colonnes, base V5_data_params)
    properties:
      - name: id
        physicalType: varchar(50)
        required: true
      - name: code_site
        physicalType: varchar(50)
        description: Code site Eaufrance
      - name: libelle
        physicalType: varchar(255)
      - name: code_cours_eau
        physicalType: varchar(50)
      - name: geom_pt
        physicalType: point
        description: Géométrie du point de mesure
  - name: vigicrues
    physicalType: table
    description: Vigilance crues par tronçon (4 colonnes)
    properties:
      - name: date_vigi
        physicalType: datetime
        required: true
      - name: id_troncon
        physicalType: varchar(6)
        required: true
        description: Identifiant du tronçon Vigicrues
      - name: couleur
        physicalType: enum
        description: Niveau 0-4 (vert → rouge)

team:
  - username: pam
    role: owner
    description: Data engineer de l'association — responsable du contrat

support:
  - channel: data
    tool: email
    url: mailto:pamahe@proton.me

slaProperties:
  - property: frequency
    value: infra-horaire (collecte cron hydro/vigicrues)
    description: Pas de récupération nominal
  - property: retention
    value: illimitée — ~622 M lignes, aucune purge documentée (candidat prioritaire à une politique de rétention)
    description: Politique de rétention

customProperties:
  - property: lineageJob
    value: cron://infoclimat:cron.eaufrance_data ; cron://infoclimat:cron.eaufrance_stations ; cron://infoclimat:cron.vigicrues
  - property: upstreamSources
    value: api://eaufrance/hubeau-hydrometrie, api://vigicrues (cf. inventory/external-sources.yaml)
  - property: dataLicense
    value: >-
      Données publiques françaises : Hub'Eau / Eaufrance et Vigicrues (SCHAPI) sont
      diffusés sous Licence Ouverte (Etalab) 2.0 — attribution de la source requise
      lors de toute réutilisation.
