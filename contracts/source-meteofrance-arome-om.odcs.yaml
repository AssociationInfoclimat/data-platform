apiVersion: v3.0.2
kind: DataContract
id: urn:infoclimat:contract:source-meteofrance-arome-om
name: Paquets AROME Outre-mer (DPPaquetAROME-OM)
version: "1.0.0"
status: active
domain: modeles
tags: [source, meteofrance, api]

description:
  purpose: >-
    Contrat de la SOURCE API DPPaquetAROME-OM — paquets GRIB2 AROME Outre-mer
    pour 5 territoires (Indien, Antilles, Guyane, Nouvelle-Calédonie, Polynésie),
    résolution 0.025°, horizon 48 h.
  usage: >-
    Consommé par les pipelines de téléchargement AROME-OM. Découverte du run actif
    via GET Range bytes=0-0 sur time=048H (206 = servi, 404 = pas encore dispo).
  limitations: >-
    Libellés MODEL et produit tronqués (ne pas deviner). Antilles/Guyane/Polynésie
    en longitude 0-360 (normaliser −360). Grille N→S (flip).

servers:
  - server: meteofrance-arome-om
    type: api
    environment: production
    location: https://public-api.meteofrance.fr/previnum/DPPaquetAROME-OM/v1

schema:
  - name: arome-om-paquet
    physicalType: GRIB2
    description: "Paquet GRIB2 AROME Outre-mer (parité variables avec AROME métropole SP1/SP2)."
    properties: []

customProperties:
  - property: externalSource
    value:
      apiId: AROME-OM
      host: public-api.meteofrance.fr
      context: /previnum/DPPaquetAROME-OM/v1
      urlTemplate: "/previnum/DPPaquetAROME-OM/v1/models/{MODEL}/grids/0.025/packages/{PKG}/{PRODUCT}?referencetime={RUN}&time={001H}&format=grib2"
      auth: token
      probeUrl: https://public-api.meteofrance.fr/previnum/DPPaquetAROME-OM/v1/models/AROME-OM-INDIEN/grids/0.025/packages
      verified: "✅ vérifié en live"
      unitsNote: "GRIB2. Parité variables avec AROME métropole (mêmes shortNames SP1/SP2)."
      descriptor: "GET .../models/{MODEL}/grids/0.025/packages (paquets servis)"
      quirks:
        - "5 territoires, libellés TRONQUÉS + product distinct (ne pas deviner les noms longs → 404) :"
        - "INDIEN/productOMOI · ANTIL/productOMAN · GUYANE/productOMGU · NCALED/productOMNC · POLYN/productOMPF."
        - "Échéance SIMPLE (001H, pas de fenêtre 6 h). Horizon 48 h. Orientation N→S (flip). Antilles/Guyane/Polynésie en lon 0-360 (normaliser −360)."
        - "Sélection run = découverte : GET Range bytes=0-0 sur time=048H (206 servi / 404 pas encore ; HEAD → 405). Run complet ~H+8-11."
  - property: changelog
    value:
      - version: "1.0.0"
        date: "2026-06-17"
        type: initial
        severity: non-breaking
        fields: []
        note: Transcription du dict.

team:
  - username: pam
    role: owner
    description: Data engineer de l'association — responsable du contrat.

support:
  - channel: data
    tool: email
    url: mailto:pamahe@proton.me
