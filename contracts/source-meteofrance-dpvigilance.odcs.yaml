apiVersion: v3.0.2
kind: DataContract
id: urn:infoclimat:contract:source-meteofrance-dpvigilance
name: "Source Météo-France — Vigilance (DPVigilance)"
version: "1.0.0"
status: active
domain: vigilance
tags: [source, meteofrance, api]

description:
  purpose: >-
    Contrat de la SOURCE API DPVigilance — vigilance météo en cours (couleurs par
    département, phénomènes, échéances J et J+1, textes de suivi). Données
    catégorielles (vert/jaune/orange/rouge) par domaine/département pour la France
    métropolitaine et DOM.
  usage: >-
    Consommé par include/Vigilances/vigilances.php (site-infoclimat) pour les
    endpoints cartevigilance/encours, textesvigilance/encours et
    vignettenationale-J-et-J1/encours. JSON imbriqué, non tabulaire.
  limitations: >-
    Contrat SOURCE distinct du contrat table persistée vigilances-meteo.odcs.yaml.
    Pas de schéma tabulaire plat : la réponse est un objet JSON imbriqué
    (product.periods[].timelaps.domain_ids[]). Échéances J et J+1 seulement
    (2 périodes au plus par produit carte). Vignette nationale = fichier image (non JSON).

servers:
  - server: meteofrance-dpvigilance
    type: api
    environment: production
    location: "https://public-api.meteofrance.fr/public/DPVigilance/v1"

schema:
  - name: vigilance
    physicalType: object
    description: >-
      Réponse JSON imbriquée de l'endpoint cartevigilance/encours — pas de schéma
      tabulaire plat. Champs extraits par le code consommateur.
    properties: []

customProperties:
  - property: externalSource
    value:
      apiId: DPVigilance
      docUrl: "https://confluence-meteofrance.atlassian.net/wiki/spaces/OpenDataMeteoFrance/pages/854065168/"
      host: public-api.meteofrance.fr
      context: /public/DPVigilance/v1
      urlTemplate: >-
        /public/DPVigilance/v1/cartevigilance/encours |
        /public/DPVigilance/v1/textesvigilance/encours |
        /public/DPVigilance/v1/vignettenationale-J-et-J1/encours |
        /public/DPVigilance/v1/vigilanceom/controle/dernier |
        /public/DPVigilance/v1/vigilanceom/flux/dernier
      auth: token
      probeUrl: "https://public-api.meteofrance.fr/public/DPVigilance/v1/cartevigilance/encours"
      verified: "✅ consommé par include/Vigilances/vigilances.php"
      unitsNote: >-
        Vigilance = données catégorielles, pas d'unité physique.
        Couleurs : 1=vert, 2=jaune, 3=orange, 4=rouge (entiers dans l'API ; legacy : 0=vert).
        Phénomènes : 1=vent, 2=pluie, 3=orages, 4=crues, 5=neige/verglas, 6=canicule,
        7=grand froid, 8=avalanches, 9=vagues submersion.
        Structure JSON : product.periods[].timelaps.domain_ids[].{domain_id, max_color_id,
        phenomenon_items[].{phenomenon_id, phenomenon_max_color_id}}.
        Timestamps : begin_validity_time / end_validity_time au format ISO 8601 UTC.
      descriptor: "include/Vigilances/vigilances.php (site-infoclimat) — fonctions de parsing et constantes"
      quirks:
        - "Réponse JSON imbriquée (product.periods[], timelaps, domain_ids) — non tabulaire."
        - "2 périodes maximum par produit carte (index 0 = période courante J, index 1 = J+1)."
        - "domain_id de longueur 2 = département (01..95, 2A, 2B, 99) ; autres longueurs ignorées par le code."
        - "Endpoint vignettenationale-J-et-J1/encours = image (download binaire, non JSON)."
        - "Auth OAuth2 : token récupéré sur portail-api.meteofrance.fr/token, utilisé en Bearer sur public-api."
        - "Couleurs legacy (0-3) dans le schéma SQL persisté diffèrent des codes API — mapping COLORS_CODES_TO_LEGACY_MAP."
        - >-
          ⚠️ À CONFIRMER (codes couleur) : la doc Confluence MF (page 854065168) indique color_id 1-3
          (1=jaune, 2=orange, 3=rouge) alors que notre code en relève 1-4 (avec 1=vert). Incohérence
          non tranchée — vérifier sur une réponse live avant de s'appuyer sur le mapping.
        - >-
          Outre-mer : endpoints /vigilanceom/controle/dernier (fichier de contrôle) et
          /vigilanceom/flux/dernier (archive ZIP + checksum). La Nouvelle-Calédonie a migré vers le
          schéma Vigilance V6 (arrêt du flux V5, 04/2026, page 1641480275) ; Vigilance Outre-mer
          évoluée 02/2025.
  - property: changelog
    value:
      - version: "1.1.0"
        date: "2026-04-01"
        type: feature
        severity: non-breaking
        fields: []
        note: >-
          Endpoints Outre-mer documentés (/vigilanceom/controle/dernier, /vigilanceom/flux/dernier) ;
          schéma Vigilance V6 (Nouvelle-Calédonie migre V6, arrêt flux V5 — page 1641480275).
          Correction endpoint vignette : vignettenationale-J-et-J1/encours (et non -J). Non-breaking
          (ajouts/clarifications). Source : Confluence MF (page 854065168).
      - version: "1.0.0"
        date: "2026-06-01"
        type: initial
        severity: non-breaking
        fields: []
        note: "Sourcé sur site-infoclimat/include/Vigilances/vigilances.php. Source API distincte du contrat table vigilances-meteo."

team:
  - username: pam
    role: owner
    description: Data engineer de l'association — responsable du contrat.

support:
  - channel: data
    tool: email
    url: mailto:pamahe@proton.me
